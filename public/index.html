<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF9F5" />
  <title>NavGPT — Ask Naveen</title>
  <style>
    :root {
      --bg: #FAF9F5;
      --panel: #FFFFFF;
      --accent: #D97757;
      --accent-dark: #BF5E3F;
      --accent-light: #F3E4DB;
      --text: #2D2A26;
      --muted: #83786C;
      --border: #EAE5DC;
      --border-soft: #F0ECE4;
      --shadow: 0 1px 2px rgba(45, 42, 38, 0.04), 0 2px 8px rgba(45, 42, 38, 0.04);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ---------- Header ---------- */
    header {
      padding: calc(12px + var(--safe-top)) 20px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(191, 94, 63, 0.28);
    }

    header h1 {
      font-size: 1.02rem;
      margin: 0;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    #authArea button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: inherit;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    #authArea button:hover {
      background: var(--accent-dark);
    }

    #authArea button:active {
      transform: scale(0.97);
    }

    #signOutBtn {
      background: transparent !important;
      color: var(--muted) !important;
      border: 1px solid var(--border) !important;
      padding: 7px 14px !important;
    }

    #signOutBtn:hover {
      background: var(--border-soft) !important;
      color: var(--text) !important;
    }

    #userInfo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 500;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ---------- Chat window ---------- */
    #chatWindow {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 12px;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      margin-bottom: 18px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: rise 0.22s ease-out;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      justify-content: flex-end;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      margin-bottom: 2px;
    }

    .msg.bot .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      line-height: 1.55;
      white-space: pre-wrap;
      font-size: 0.95rem;
      word-wrap: break-word;
    }

    .msg.user .bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--panel);
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow);
      border-bottom-left-radius: 4px;
    }

    /* typing indicator */
    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 2px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.5;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.5;
      }

      30% {
        transform: translateY(-4px);
        opacity: 1;
      }
    }

    /* ---------- Signed out state ---------- */
    #signedOutNotice {
      max-width: 420px;
      margin: 15vh auto 0;
      text-align: center;
      color: var(--muted);
      padding: 0 24px;
    }

    #signedOutNotice .empty-mark {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 18px;
    }

    #signedOutNotice h2 {
      color: var(--text);
      font-size: 1.15rem;
      margin: 0 0 8px;
      font-weight: 600;
    }

    #signedOutNotice p {
      font-size: 0.92rem;
      line-height: 1.5;
      margin: 0;
    }

    /* ---------- Input bar ---------- */
    #inputBar {
      border-top: 1px solid var(--border-soft);
      background: var(--panel);
      padding: 14px 20px calc(14px + var(--safe-bottom));
      display: flex;
      gap: 10px;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #inputBar textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      line-height: 1.4;
      max-height: 140px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    #inputBar textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
      background: var(--panel);
    }

    #inputBar textarea::placeholder {
      color: var(--muted);
    }

    #inputBar button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0 20px;
      height: 42px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.92rem;
      font-family: inherit;
      flex-shrink: 0;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    #inputBar button:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    #inputBar button:active:not(:disabled) {
      transform: scale(0.96);
    }

    #inputBar button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #inputBar button:focus-visible,
    #authArea button:focus-visible,
    #inputBar textarea:focus-visible {
      outline: 2px solid var(--accent-dark);
      outline-offset: 2px;
    }

    /* ---------- Scrollbar ---------- */
    #chatWindow::-webkit-scrollbar {
      width: 8px;
    }

    #chatWindow::-webkit-scrollbar-track {
      background: transparent;
    }

    #chatWindow::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    #chatWindow::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 640px) {
      header {
        padding: calc(10px + var(--safe-top)) 14px 10px;
      }

      header h1 {
        font-size: 0.95rem;
      }

      #userInfo span {
        display: none;
      }

      #chatWindow {
        padding: 16px 14px 8px;
      }

      #inputBar {
        padding: 10px 12px calc(10px + var(--safe-bottom));
        gap: 8px;
      }

      .bubble {
        max-width: 84%;
        font-size: 0.93rem;
      }

      #inputBar button {
        padding: 0 16px;
        font-size: 0.88rem;
      }

      #signedOutNotice {
        margin-top: 10vh;
      }
    }

    @media (min-width: 900px) {

      #chatWindow,
      #inputBar {
        max-width: 820px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .msg {
        animation: none;
      }

      .typing-dots span {
        animation: none;
        opacity: 0.6;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="brand">
      <div class="brand-mark">📚</div>
      <h1>NavGPT</h1>
    </div>
    <div id="authArea"></div>
  </header>

  <div id="chatWindow"></div>
  <div id="inputBar" style="display:none;">
    <textarea id="messageInput" rows="1" placeholder="Ask Naveen anything..."></textarea>
    <button id="sendBtn">Send</button>
  </div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, query, orderBy, limit, getDocs, addDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // URL of your Render backend (see render-backend/index.js).
    // Replace with your actual Render service URL once deployed,
    // e.g. "https://navgpt-backend.onrender.com"
    const BACKEND_URL = "https://navgpt-backend.onrender.com";

    // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries

    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBNn4wSs7yecfaAPmwPYbGNSVpELkD22fs",
      authDomain: "naveen-gpt.firebaseapp.com",
      projectId: "naveen-gpt",
      storageBucket: "naveen-gpt.firebasestorage.app",
      messagingSenderId: "1039081984469",
      appId: "1:1039081984469:web:00911e2678e60d3d1b6d5c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const authArea = document.getElementById("authArea");
    const chatWindow = document.getElementById("chatWindow");
    const inputBar = document.getElementById("inputBar");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    let history = []; // {role, content} pairs sent to the model
    let currentUser = null;

    function initials(nameOrEmail) {
      if (!nameOrEmail) return "?";
      const parts = nameOrEmail.trim().split(" ");
      if (parts.length > 1) return (parts[0][0] + parts[1][0]).toUpperCase();
      return nameOrEmail[0].toUpperCase();
    }

    function renderMessage(role, content) {
      const row = document.createElement("div");
      row.className = `msg ${role === "user" ? "user" : "bot"}`;

      if (role !== "user") {
        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = "📚";
        row.appendChild(avatar);
      }

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = content;
      row.appendChild(bubble);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return row;
    }

    function renderTyping() {
      const row = document.createElement("div");
      row.className = "msg bot";
      row.id = "typingRow";
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = "📚";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
      row.appendChild(avatar);
      row.appendChild(bubble);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function removeTyping() {
      const row = document.getElementById("typingRow");
      if (row) row.remove();
    }

    // auto-grow textarea
    messageInput.addEventListener("input", () => {
      messageInput.style.height = "auto";
      messageInput.style.height = Math.min(messageInput.scrollHeight, 140) + "px";
    });

    async function loadHistory(uid) {
      chatWindow.innerHTML = "";
      history = [];
      const q = query(
        collection(db, "users", uid, "conversations"),
        orderBy("createdAt", "asc"),
        limit(50)
      );
      const snap = await getDocs(q);
      snap.forEach((doc) => {
        const d = doc.data();
        renderMessage("user", d.userMessage);
        renderMessage("bot", d.reply);
        history.push({ role: "user", content: d.userMessage });
        history.push({ role: "assistant", content: d.reply });
      });
    }

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        authArea.innerHTML = `
        <div id="userInfo">
          <div class="user-avatar">${initials(user.displayName || user.email)}</div>
          <span>${user.displayName || user.email}</span>
          <button id="signOutBtn">Sign out</button>
        </div>`;
        document.getElementById("signOutBtn").onclick = () => signOut(auth);
        inputBar.style.display = "flex";
        await loadHistory(user.uid);
      } else {
        authArea.innerHTML = `<button id="signInBtn">Sign in with Google</button>`;
        document.getElementById("signInBtn").onclick = () =>
          signInWithPopup(auth, new GoogleAuthProvider());
        inputBar.style.display = "none";
        chatWindow.innerHTML = `
        <div id="signedOutNotice">
          <div class="empty-mark">📚</div>
          <h2>Welcome to NavGPT</h2>
          <p>Sign in to start chatting with Naveen — your conversation history is saved to your account.</p>
        </div>`;
      }
    });

    async function send() {
      const text = messageInput.value.trim();
      if (!text || !currentUser) return;
      messageInput.value = "";
      messageInput.style.height = "auto";
      sendBtn.disabled = true;
      renderMessage("user", text);
      renderTyping();

      try {
        const idToken = await currentUser.getIdToken();
        const res = await fetch(`${BACKEND_URL}/api/chat`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${idToken}`,
          },
          body: JSON.stringify({ message: text, history }),
        });

        if (!res.ok) throw new Error(`Backend responded with ${res.status}`);
        const data = await res.json();
        const reply = data.reply;

        removeTyping();
        renderMessage("bot", reply);
        history.push({ role: "user", content: text });
        history.push({ role: "assistant", content: reply });

        // Save the exchange to Firestore so it's there next time they sign in
        await addDoc(collection(db, "users", currentUser.uid, "conversations"), {
          userMessage: text,
          reply,
          createdAt: serverTimestamp(),
        });
      } catch (err) {
        console.error(err);
        removeTyping();
        renderMessage("bot", "Sorry, something went wrong. Please try again.");
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF9F5" />
  <title>NavGPT — Ask Naveen</title>
  <link rel="icon" href="/icons/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <style>
    :root {
      --bg: #FAF9F5;
      --panel: #FFFFFF;
      --accent: #D97757;
      --accent-dark: #BF5E3F;
      --accent-light: #F3E4DB;
      --text: #2D2A26;
      --muted: #83786C;
      --border: #EAE5DC;
      --border-soft: #F0ECE4;
      --shadow: 0 1px 2px rgba(45, 42, 38, 0.04), 0 2px 8px rgba(45, 42, 38, 0.04);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --sidebar-w: 260px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      -webkit-font-smoothing: antialiased;
    }

    /* ---------- Sidebar ---------- */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border-soft);
      display: flex;
      flex-direction: column;
      padding: calc(12px + var(--safe-top)) 10px 10px;
      transition: transform 0.22s ease;
      z-index: 30;
    }

    #newChatBtn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      font-family: inherit;
    }

    #newChatBtn:hover {
      background: var(--accent-dark);
    }

    #chatList {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .chat-item {
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .chat-item:hover {
      background: var(--border-soft);
    }

    .chat-item.active {
      background: var(--accent-light);
      color: var(--accent-dark);
      font-weight: 600;
    }

    .chat-item .chat-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item .chat-delete {
      opacity: 0;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 2px 5px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .chat-item:hover .chat-delete {
      opacity: 1;
    }

    .chat-item .chat-delete:hover {
      background: var(--border);
      color: var(--text);
    }

    #loadMoreChatsBtn {
      display: block;
      width: 100%;
      background: none;
      border: 1px dashed var(--border);
      color: var(--muted);
      border-radius: var(--radius-sm);
      padding: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      margin-top: 6px;
      font-family: inherit;
    }

    #loadMoreChatsBtn:hover {
      background: var(--border-soft);
      color: var(--text);
    }

    #loadMoreChatsBtn:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    #sidebarOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(45, 42, 38, 0.3);
      z-index: 20;
    }

    /* ---------- Main column ---------- */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    header {
      padding: calc(12px + var(--safe-top)) 20px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #menuBtn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      color: var(--text);
      font-size: 1.1rem;
      border-radius: 8px;
    }

    #menuBtn:hover {
      background: var(--border-soft);
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(191, 94, 63, 0.28);
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    header h1 {
      font-size: 1.02rem;
      margin: 0;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .icon-spin {
      animation: spin 1.3s linear infinite;
    }

    #modelSelect {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 10px;
      font-size: 0.82rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      cursor: pointer;
      max-width: 160px;
    }

    #modelSelect:focus {
      outline: none;
      border-color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #authArea button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: inherit;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    #authArea button:hover {
      background: var(--accent-dark);
    }

    #authArea button:active {
      transform: scale(0.97);
    }

    #signOutBtn {
      background: transparent !important;
      color: var(--muted) !important;
      border: 1px solid var(--border) !important;
      padding: 7px 14px !important;
    }

    #signOutBtn:hover {
      background: var(--border-soft) !important;
      color: var(--text) !important;
    }

    #userInfo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 500;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ---------- Chat window ---------- */
    #chatWindow {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 12px;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      -webkit-overflow-scrolling: touch;
    }

    #loadMoreMessagesBtn {
      display: block;
      margin: 0 auto 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: inherit;
    }

    #loadMoreMessagesBtn:hover {
      background: var(--border-soft);
      color: var(--text);
    }

    #loadMoreMessagesBtn:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    .msg {
      margin-bottom: 18px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: rise 0.22s ease-out;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      justify-content: flex-end;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      margin-bottom: 2px;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      line-height: 1.55;
      white-space: pre-wrap;
      font-size: 0.95rem;
      word-wrap: break-word;
    }

    .msg.user .bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--panel);
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow);
      border-bottom-left-radius: 4px;
    }

    .export-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--border);
    }

    .export-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-light);
      color: var(--accent-dark);
      border: none;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease;
    }

    .export-btn:hover {
      background: var(--border);
    }

    .export-btn:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    .export-btn.attach-btn {
      background: transparent;
      color: var(--muted);
      border: 1px dashed var(--border);
    }

    .export-btn.attach-btn:hover {
      background: var(--border-soft);
      color: var(--text);
    }

    .export-btn.attach-btn.has-image {
      color: var(--accent-dark);
      border-style: solid;
      border-color: var(--border);
    }

    .export-footer-input {
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.8rem;
      font-family: inherit;
      color: var(--text);
      background: transparent;
      min-width: 180px;
      flex: 1;
    }

    .export-footer-input:focus {
      outline: none;
      border-color: var(--accent);
      border-style: solid;
      background: var(--bg);
    }

    .export-footer-input::placeholder {
      color: var(--muted);
    }

    .reasoning-block {
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px dashed var(--border);
      color: var(--muted);
      font-size: 0.85rem;
      font-style: italic;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    /* Rendered markdown inside bot replies */
    .content-text {
      white-space: normal;
    }

    .content-text>*:first-child {
      margin-top: 0;
    }

    .content-text>*:last-child {
      margin-bottom: 0;
    }

    .content-text p {
      margin: 0 0 10px;
    }

    .content-text h1,
    .content-text h2,
    .content-text h3 {
      margin: 16px 0 8px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }

    .content-text h1 {
      font-size: 1.25rem;
    }

    .content-text h2 {
      font-size: 1.12rem;
    }

    .content-text h3 {
      font-size: 1.02rem;
    }

    .content-text strong {
      font-weight: 700;
      color: var(--text);
    }

    .content-text em {
      font-style: italic;
    }

    .content-text ul,
    .content-text ol {
      margin: 0 0 10px;
      padding-left: 22px;
    }

    .content-text li {
      margin-bottom: 4px;
    }

    .content-text li>p {
      margin: 0;
    }

    .content-text a {
      color: var(--accent-dark);
      text-decoration: underline;
    }

    .content-text code {
      background: var(--border-soft);
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 0.85em;
      font-family: "SF Mono", Consolas, Monaco, monospace;
    }

    .content-text pre {
      background: #2D2A26;
      color: #FAF9F5;
      border-radius: 8px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 0 0 10px;
      font-size: 0.85em;
    }

    .content-text pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    .content-text blockquote {
      border-left: 3px solid var(--accent);
      margin: 0 0 10px;
      padding: 2px 0 2px 12px;
      color: var(--muted);
      font-style: italic;
    }

    .content-text hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    .content-text table {
      border-collapse: collapse;
      margin: 0 0 10px;
      font-size: 0.9em;
    }

    .content-text th,
    .content-text td {
      border: 1px solid var(--border);
      padding: 6px 10px;
    }

    .content-text th {
      background: var(--border-soft);
      font-weight: 600;
    }

    .reasoning-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent-dark);
      font-style: normal;
      display: block;
      margin-bottom: 4px;
    }

    .stream-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.9s steps(1) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 2px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.5;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.5;
      }

      30% {
        transform: translateY(-4px);
        opacity: 1;
      }
    }

    /* Queue status shown inside a bot bubble while a message waits its turn */
    .queue-status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .queue-status .queue-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .queue-status strong {
      color: var(--text);
      font-weight: 600;
    }

    #signedOutNotice {
      max-width: 420px;
      margin: 15vh auto 0;
      text-align: center;
      color: var(--muted);
      padding: 0 24px;
    }

    #signedOutNotice .empty-mark {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      overflow: hidden;
      margin: 0 auto 18px;
    }

    #signedOutNotice .empty-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #signedOutNotice h2 {
      color: var(--text);
      font-size: 1.15rem;
      margin: 0 0 8px;
      font-weight: 600;
    }

    #signedOutNotice p {
      font-size: 0.92rem;
      line-height: 1.5;
      margin: 0;
    }

    #inputBar {
      border-top: 1px solid var(--border-soft);
      background: var(--panel);
      padding: 14px 20px calc(14px + var(--safe-bottom));
      display: flex;
      gap: 10px;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #inputBar textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      line-height: 1.4;
      max-height: 140px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    #inputBar textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
      background: var(--panel);
    }

    #inputBar textarea::placeholder {
      color: var(--muted);
    }

    #inputBar button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0 20px;
      height: 42px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.92rem;
      font-family: inherit;
      flex-shrink: 0;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    #inputBar button:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    #inputBar button:active:not(:disabled) {
      transform: scale(0.96);
    }

    #inputBar button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #inputBar button:focus-visible,
    #authArea button:focus-visible,
    #inputBar textarea:focus-visible {
      outline: 2px solid var(--accent-dark);
      outline-offset: 2px;
    }

    #chatWindow::-webkit-scrollbar,
    #chatList::-webkit-scrollbar {
      width: 8px;
    }

    #chatWindow::-webkit-scrollbar-track,
    #chatList::-webkit-scrollbar-track {
      background: transparent;
    }

    #chatWindow::-webkit-scrollbar-thumb,
    #chatList::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    #chatWindow::-webkit-scrollbar-thumb:hover,
    #chatList::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    @media (max-width: 860px) {
      #sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        transform: translateX(-100%);
        box-shadow: 0 0 0 rgba(0, 0, 0, 0);
      }

      #sidebar.open {
        transform: translateX(0);
        box-shadow: 4px 0 24px rgba(45, 42, 38, 0.15);
      }

      #sidebarOverlay.open {
        display: block;
      }

      #menuBtn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
    }

    @media (max-width: 640px) {
      header {
        padding: calc(10px + var(--safe-top)) 14px 10px;
      }

      header h1 {
        font-size: 0.95rem;
      }

      #userInfo span {
        display: none;
      }

      #chatWindow {
        padding: 16px 14px 8px;
      }

      #inputBar {
        padding: 10px 12px calc(10px + var(--safe-bottom));
        gap: 8px;
      }

      .bubble {
        max-width: 84%;
        font-size: 0.93rem;
      }

      #inputBar button {
        padding: 0 16px;
        font-size: 0.88rem;
      }

      #signedOutNotice {
        margin-top: 10vh;
      }

      #modelSelect {
        max-width: 110px;
        font-size: 0.75rem;
      }
    }

    @media (min-width: 900px) {

      #chatWindow,
      #inputBar {
        max-width: 820px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .msg {
        animation: none;
      }

      .typing-dots span,
      .queue-status .queue-dot {
        animation: none;
        opacity: 0.6;
      }
    }
  </style>
  <!--
    Document export libraries.

    SECURITY NOTE (see README / SECURITY.md): these are pinned to exact
    versions, but do NOT yet have Subresource Integrity (SRI) hashes below.
    Without SRI, a compromised CDN could serve altered JS to every user of
    this authenticated app. Before shipping, generate real hashes for the
    exact files this page loads and add them as `integrity="sha384-..."`,
    e.g.:

      curl -s https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js \
        | openssl dgst -sha384 -binary | openssl base64 -A

    Do this for each script below, then keep the hash pinned alongside the
    version number so a future version bump can't silently drop it.
  -->
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js" crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <script src="https://unpkg.com/docx@8.5.0/build/index.js" crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <!-- Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js" crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
</head>

<body>

  <div id="sidebarOverlay"></div>
  <div id="sidebar">
    <button id="newChatBtn">+ New chat</button>
    <div id="chatList"></div>
  </div>

  <div id="main">
    <header>
      <div class="brand">
        <button id="menuBtn" aria-label="Toggle chat list">☰</button>
        <div class="brand-mark" id="brandMark"><img src="/icons/icon-192.png" alt="NavGPT" /></div>

    // ================= Document export (PPTX / DOCX / PDF, optional banner) =================

    // Attempts to recover a valid JSON object from text that got cut off
    // mid-structure (e.g. the model's response hit a token limit before
    // finishing). Rolls back to the last complete element and closes any
    // still-open brackets/strings.
    function tryRepairTruncatedJson(text) {
      try { return JSON.parse(text); } catch { }

      let stack = [];
      let inString = false;
      let escape = false;
      let lastSafeIndex = -1;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inString) {
          if (escape) escape = false;
          else if (ch === "\\") escape = true;
          else if (ch === '"') inString = false;
          continue;
        }
        if (ch === '"') { inString = true; continue; }
        if (ch === "{" || ch === "[") { stack.push(ch); continue; }
        if (ch === "}" || ch === "]") {
          stack.pop();
          // A "}" or "]" is itself a safe place to cut the string, as long
          // as we're not currently inside a quoted string.
          lastSafeIndex = i;
          continue;
        }
        if (ch === ",") lastSafeIndex = i;
      }

      if (lastSafeIndex === -1) return null;
      let truncated = text.slice(0, lastSafeIndex + 1).replace(/,\s*$/, "");

      stack = [];
      inString = false;
      escape = false;
      for (let i = 0; i < truncated.length; i++) {
        const ch = truncated[i];
        if (inString) {
          if (escape) escape = false;
          else if (ch === "\\") escape = true;
          else if (ch === '"') inString = false;
          continue;
        }
        if (ch === '"') { inString = true; continue; }
        if (ch === "{" || ch === "[") stack.push(ch);
        else if (ch === "}" || ch === "]") stack.pop();
      }

      // If the cut point somehow left us mid-string (rare, but possible if
      // the stream died mid-word before we found a later safe point),
      // close the string first so the JSON stays valid.
      if (inString) truncated += '"';

      let closer = "";
      for (let i = stack.length - 1; i >= 0; i--) closer += stack[i] === "{" ? "}" : "]";

      try {
        return JSON.parse(truncated + closer);
      } catch (err) {
        console.error("JSON repair attempt failed:", err, "\nAttempted:", truncated + closer);
        return null;
      }
    }

    // A bullet is "well-formed" if it reads like an actual finished thought,
    // not a fragment left behind by a truncation cut or a bad sentence
    // split. This is intentionally conservative — false negatives (dropping
    // a slightly terse-but-valid bullet) are far less harmful than false
    // positives (shipping a garbled line like "Binary–6G." into a deck).
    //
    // Heuristics, all must pass:
    //  - at least 3 whitespace-separated words
    //  - at least 12 characters of actual content
    //  - ends with sentence-final punctuation, a closing bracket, or a
    //    digit/unit (tables of numbers legitimately end without a period)
    //  - doesn't end on a dangling connector word ("and", "the", "a", "of",
    //    an em/en dash, ...) which is the classic truncation-cut signature
    function isWellFormedBullet(str) {
      if (typeof str !== "string") return false;
      const trimmed = str.trim();
      if (trimmed.length < 12) return false;

      const words = trimmed.split(/\s+/).filter(Boolean);
      if (words.length < 3) return false;

      const lastWord = words[words.length - 1].toLowerCase().replace(/[.,;:!?)"'”’]+$/, "");
      const danglingConnectors = new Set([
        "a", "an", "the", "and", "or", "but", "of", "to", "in", "on", "for",
        "with", "is", "are", "was", "were", "this", "that", "these", "those",
        "binary", "decimal", "octal", "hexadecimal", // bare base name with no value after it is a truncation smell
      ]);
      if (danglingConnectors.has(lastWord)) return false;

      // Trailing dash/en-dash/em-dash with nothing meaningful after it
      // (e.g. "Binary–6G." slipping through would still fail the word-count
      // check above in this exact case, but guard the general pattern too).
      if (/[-–—]\s*$/.test(trimmed.replace(/[.!?]+$/, ""))) return false;

      const endsOk = /[.!?)\u2019\u201d\d%]$/.test(trimmed) || /[a-zA-Z0-9]₀|₁|₂|₃|₄|₅|₆|₇|₈|₉$/.test(trimmed);
      return endsOk || /[a-z0-9]$/i.test(trimmed);
    }

    // Drops any section object that doesn't look genuinely complete (missing
    // heading, or content that isn't a non-empty array of well-formed
    // strings). This matters most after a repair recovers a syntactically
    // valid JSON blob that still has a half-finished last section/bullet.
    function dropIncompleteSections(exportData) {
      if (!exportData || !Array.isArray(exportData.sections)) return exportData;
      const cleaned = exportData.sections
        .map((s) => {
          if (!s || typeof s.heading !== "string" || !s.heading.trim() || !Array.isArray(s.content)) {
            return null;
          }
          // Filter out individual garbled/truncated bullets rather than
          // rejecting the whole section for one bad line.
          const goodContent = s.content.filter(
            (c) => typeof c === "string" && c.trim().length > 0 && isWellFormedBullet(c)
          );
          if (goodContent.length === 0) return null;
          return { ...s, content: goodContent };
        })
        .filter(Boolean);
      return { ...exportData, sections: cleaned };
    }

    // Locates the model's structured export block regardless of exactly how
    // it fenced it. Different models are inconsistent about this: some use
    // the literal "```export-json" tag, others use a plain "```json" or
    // "```" fence, and some (seen with Nemotron in testing) skip the fence
    // altogether and just emit the raw JSON object inline. Missing this
    // used to mean the whole reply — JSON included — fell through to the
    // plain-text fallback, which dumped the raw JSON text onto a slide.
    function findExportBlockBounds(fullText) {
      // 1) Any fenced code block whose language tag looks JSON-ish
      //    (export-json, json, JSON, ...) or has no tag at all.
      const fenceRe = /```([a-zA-Z-]*)\n?/g;
      let m;
      while ((m = fenceRe.exec(fullText)) !== null) {
        const tag = (m[1] || "").toLowerCase();
        const contentStart = m.index + m[0].length;
        const closeIdx = fullText.indexOf("```", contentStart);
        const contentEnd = closeIdx === -1 ? fullText.length : closeIdx;
        const inner = fullText.slice(contentStart, contentEnd).trim();
        const looksJsonTag = tag === "" || tag.includes("json");
        const looksJsonBody = inner.startsWith("{") && /"sections"\s*:/.test(inner);
        if (looksJsonTag && looksJsonBody) {
          return {
            startIdx: m.index,
            jsonChunk: inner,
            blockEndInFullText: closeIdx === -1 ? fullText.length : closeIdx + 3,
            wasTruncated: closeIdx === -1,
          };
        }
      }

      // 2) No fence at all — the model just wrote the JSON object inline.
      //    Find the first "{" that plausibly starts the export object (has
      //    a "sections" key somewhere after it) and balance braces/strings
      //    to find where it ends.
      const firstBrace = fullText.indexOf("{");
      if (firstBrace !== -1 && /"sections"\s*:/.test(fullText.slice(firstBrace, firstBrace + 4000))) {
        let depth = 0, inString = false, escape = false, endIdx = -1;
        for (let i = firstBrace; i < fullText.length; i++) {
          const ch = fullText[i];
          if (inString) {
            if (escape) escape = false;
            else if (ch === "\\") escape = true;
            else if (ch === '"') inString = false;
            continue;
          }
          if (ch === '"') { inString = true; continue; }
          if (ch === "{") depth++;
          else if (ch === "}") { depth--; if (depth === 0) { endIdx = i + 1; break; } }
        }
        const jsonChunk = fullText.slice(firstBrace, endIdx === -1 ? fullText.length : endIdx);
        if (jsonChunk.trim().startsWith("{")) {
          return {
            startIdx: firstBrace,
            jsonChunk: jsonChunk.trim(),
            blockEndInFullText: endIdx === -1 ? fullText.length : endIdx,
            wasTruncated: endIdx === -1,
          };
        }
      }

      return null;
    }

    function parseExportBlock(fullText) {
      const bounds = findExportBlockBounds(fullText);
      if (!bounds) return { displayText: fullText, exportData: null };

      const { startIdx, jsonChunk, blockEndInFullText } = bounds;
      let exportData = null;
      let wasTruncated = bounds.wasTruncated;
      try {
        exportData = JSON.parse(jsonChunk);
      } catch {
        exportData = tryRepairTruncatedJson(jsonChunk);
        wasTruncated = true;
        if (exportData) {
          console.warn("Recovered a truncated export-json block (response may have hit a length limit).");
        } else {
          console.error("Could not parse or repair export-json block.");
        }
      }

      if (exportData) {
        const originalCount = Array.isArray(exportData.sections)
          ? exportData.sections.reduce((n, s) => n + (Array.isArray(s?.content) ? s.content.length : 0), 0)
          : 0;
        exportData = dropIncompleteSections(exportData);
        const newCount = exportData.sections.reduce((n, s) => n + s.content.length, 0);
        if (newCount !== originalCount) wasTruncated = true;
      }

      if (exportData && (!Array.isArray(exportData.sections) || exportData.sections.length === 0)) {
        exportData = null; // not usable even if syntactically valid
      }

      const displayText = (fullText.slice(0, startIdx) + fullText.slice(blockEndInFullText)).trim();
      return { displayText, exportData, wasTruncated: wasTruncated && !!exportData };
    }

    // ---- Fallback: build export data from plain text when a model ignores
    // the export-json instruction entirely (some models, e.g. Nemotron in
    // testing, just answer normally instead of following that formatting
    // rule). Rather than leaving the user with no downloadable file, we
    // parse the model's own markdown reply into the same {title, sections}
    // shape the real export-json block would have produced.

    const DOC_REQUEST_REGEX = /\b(presentation|slide\s*deck|slides?|ppt|pptx|power\s*point|word\s*doc(?:ument)?|docx|pdf|report)\b/i;

    function looksLikeDocumentRequest(text) {
      return DOC_REQUEST_REGEX.test(text || "");
    }

    function buildFallbackExportData(userMessage, rawText) {
      let tokens;
      try {
        tokens = marked.lexer(rawText || "");
      } catch (err) {
        console.error("Fallback export: failed to tokenize reply as markdown:", err);
        return null;
      }

      const sections = [];
      let current = null;

      function pushContent(text) {
        const trimmed = (text || "").replace(/\s+/g, " ").trim();
        if (!trimmed) return;
        if (!current) {
          current = { heading: "Overview", content: [] };
          sections.push(current);
        }
        // Break up long paragraphs so a single item doesn't dominate a slide/page.
        // Split on sentence boundaries that are actually followed by a new
        // sentence (capital letter or digit), not just any '.', '!', '?' —
        // this avoids cutting abbreviations/decimals into fragments.
        if (trimmed.length > 220) {
          trimmed.split(/(?<=[.!?])\s+(?=[A-Z0-9])/).forEach((sentence) => {
            const s = sentence.trim();
            if (s && isWellFormedBullet(s)) current.content.push(s);
          });
        } else if (isWellFormedBullet(trimmed)) {
          current.content.push(trimmed);
        }
      }

      tokens.forEach((token) => {
        if (token.type === "heading" && token.depth <= 3) {
          const headingText = (token.text || "").replace(/\*\*/g, "").trim();
          if (headingText) {
            current = { heading: headingText, content: [] };
            sections.push(current);
          }
        } else if (token.type === "list") {
          (token.items || []).forEach((item) => pushContent(item.text));
        } else if (token.type === "paragraph" || token.type === "text") {
          pushContent(token.text);
        } else if (token.type === "table" && Array.isArray(token.rows)) {
          token.rows.forEach((row) => {
            pushContent(row.map((cell) => cell.text).join(" — "));
          });
        }
      });

      const cleanedSections = sections
        .map((s) => ({ heading: s.heading, content: (s.content || []).filter(Boolean) }))
        .filter((s) => s.heading && s.content.length > 0);

      if (!cleanedSections.length) return null;

      const title = (userMessage || "Document")
        .replace(/\b(create|generate|make|build|give\s*me|write)\b/gi, "")
        .replace(DOC_REQUEST_REGEX, "")
        .replace(/\b(a|an|the|for|about|on)\b/gi, "")
        .replace(/\s+/g, " ")
        .trim();

      return {
        title: title ? title.charAt(0).toUpperCase() + title.slice(1) : "Document",
        sections: cleanedSections,
      };
    }

    function addExportBar(bubbleEl, data) {
      const bar = document.createElement("div");
      bar.className = "export-bar";

      let bannerDataUrl = null;

      const attachBtn = document.createElement("button");
      attachBtn.type = "button";
      attachBtn.className = "export-btn attach-btn";
      attachBtn.textContent = "📎 Add cover image (optional)";
      attachBtn.addEventListener("click", () => {
        const picker = document.createElement("input");
        picker.type = "file";
        picker.accept = "image/*";
        picker.addEventListener("change", () => {
          const file = picker.files?.[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            bannerDataUrl = reader.result;
            attachBtn.textContent = "✓ Cover image added";
            attachBtn.classList.add("has-image");
          };
          reader.readAsDataURL(file);
        });
        picker.click();
      });
      bar.appendChild(attachBtn);

      const footerInput = document.createElement("input");
      footerInput.type = "text";
      footerInput.className = "export-footer-input";
      footerInput.placeholder = "Footer text for every slide/page (optional)";
      footerInput.maxLength = 80;
      bar.appendChild(footerInput);

      [
        { format: "pptx", label: "⬇ PPTX", generate: generatePPTX },
        { format: "docx", label: "⬇ DOCX", generate: generateDOCX },
        { format: "pdf", label: "⬇ PDF", generate: generatePDF },
      ].forEach(({ label, generate }) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "export-btn";
        btn.textContent = label;
        const originalLabel = label;
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          btn.textContent = "Generating…";
          try {
            await generate(data, bannerDataUrl, footerInput.value.trim());
          } catch (err) {
            console.error("Export failed:", err);
            // Surface the real message instead of hiding it behind "check the
            // console" — most failures here are the CDN script for this format
            // not having loaded (blocked by an ad-blocker / firewall / CSP),
            // which throws "X is not defined" or "Cannot read properties of
            // undefined" right away, before any file is built.
            alert(`Export failed: ${err && err.message ? err.message : err}`);
          } finally {
            btn.disabled = false;
            btn.textContent = originalLabel;
          }
        });
        bar.appendChild(btn);
      });

      bubbleEl.appendChild(bar);
    }

    function downloadBlob(blob, filename) {
      if (window.AndroidDownloader && window.AndroidDownloader.saveBase64File) {
        const reader = new FileReader();
        reader.onload = () => {
          const base64 = reader.result.split(",")[1];
          window.AndroidDownloader.saveBase64File(filename, base64, blob.type || "application/octet-stream");
        };
        reader.readAsDataURL(blob);
        return;
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function dataUrlToUint8Array(dataUrl) {
      const base64 = dataUrl.split(",")[1];
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function safeFilename(title) {
      return (title || "document").replace(/[^a-z0-9\-_ ]/gi, "").trim().slice(0, 60) || "document";
    }

    // Scales body-text font/spacing down as bullet volume grows so dense
    // sections don't overflow their fixed-size box.
    function fitBulletFontSize(items) {
      const totalChars = (items || []).reduce((sum, c) => sum + (c ? c.length : 0), 0);
      if (totalChars > 950) return { fontSize: 12, paraSpaceAfter: 8, lineSpacingMultiple: 1.05 };
      if (totalChars > 750) return { fontSize: 13, paraSpaceAfter: 10, lineSpacingMultiple: 1.08 };
      if (totalChars > 600) return { fontSize: 14, paraSpaceAfter: 12, lineSpacingMultiple: 1.1 };
      if (totalChars > 450) return { fontSize: 15, paraSpaceAfter: 13, lineSpacingMultiple: 1.12 };
      if (totalChars > 300) return { fontSize: 16, paraSpaceAfter: 14, lineSpacingMultiple: 1.13 };
      return { fontSize: 17, paraSpaceAfter: 16, lineSpacingMultiple: 1.15 };
    }

    // FIX: the agenda slide used to hardcode fontSize:20 no matter how many
    // items were in it, so a long agenda (15-20+ items, common for a
    // thorough deck) ran off the bottom of the slide. This scales down the
    // same way fitBulletFontSize does for content slides.
    function fitAgendaFontSize(count) {
      if (count > 16) return { fontSize: 13, paraSpaceAfter: 8 };
      if (count > 12) return { fontSize: 15, paraSpaceAfter: 10 };
      if (count > 8) return { fontSize: 18, paraSpaceAfter: 12 };
      return { fontSize: 20, paraSpaceAfter: 14 };
    }

    async function generatePPTX(data, bannerDataUrl, footerText) {
      if (!window.PptxGenJS) {
        throw new Error("pptxgenjs failed to load from the CDN (blocked by an ad-blocker, firewall, or CSP?). Reload the page and check the Network tab for cdn.jsdelivr.net.");
      }
      const pptx = new window.PptxGenJS();
      pptx.layout = "LAYOUT_WIDE"; // 13.33 x 7.5 in

      const ACCENT = "D97757";
      const ACCENT_DARK = "BF5E3F";
      const TEXT = "2D2A26";
      const MUTED = "83786C";
      const PAGE_W = 13.33, PAGE_H = 7.5;

      function addFooter(slide, pageNum) {
        if (footerText) {
          slide.addText(footerText, {
            x: 0.5, y: PAGE_H - 0.45, w: 8, h: 0.35, fontSize: 10, color: MUTED, fontFace: "Arial",
          });
        }
        slide.addText(String(pageNum), {
          x: PAGE_W - 1.1, y: PAGE_H - 0.45, w: 0.6, h: 0.35, fontSize: 10, color: MUTED, align: "right", fontFace: "Arial",
        });
      }

      // ---- Title slide ----
      const titleSlide = pptx.addSlide();
      titleSlide.background = { color: ACCENT };
      if (bannerDataUrl) {
        const BANNER_H = 2.6; // a true banner strip, not most of the slide
        titleSlide.addImage({ data: bannerDataUrl, x: 0, y: 0, w: PAGE_W, h: BANNER_H, sizing: { type: "cover", w: PAGE_W, h: BANNER_H } });
        // Solid accent band below the image holds the title/subtitle, so
        // text never sits on top of the photo.
        titleSlide.addShape(pptx.ShapeType.rect, { x: 0, y: BANNER_H, w: PAGE_W, h: PAGE_H - BANNER_H, fill: { color: ACCENT } });
        const remaining = PAGE_H - BANNER_H;
        titleSlide.addText(data.title || "Presentation", {
          x: 0.9, y: BANNER_H + remaining * 0.28, w: PAGE_W - 1.8, h: 1.15, fontSize: 34, bold: true, color: "FFFFFF", align: "center", fontFace: "Arial", valign: "top",
        });
        if (data.subtitle) {
          titleSlide.addText(data.subtitle, {
            x: 0.9, y: BANNER_H + remaining * 0.28 + 1.2, w: PAGE_W - 1.8, h: 0.6, fontSize: 16, italic: true, color: "FFFFFF", align: "center", fontFace: "Arial",
          });
        }
      } else {
        titleSlide.addText(data.title || "Presentation", {
          x: 0.9, y: 2.9, w: PAGE_W - 1.8, h: 1.5, fontSize: 40, bold: true, color: "FFFFFF", align: "center", fontFace: "Arial",
        });
        if (data.subtitle) {
          titleSlide.addText(data.subtitle, {
            x: 0.9, y: 4.35, w: PAGE_W - 1.8, h: 0.7, fontSize: 18, italic: true, color: "FFFFFF", align: "center", fontFace: "Arial",
          });
        }
      }

      // ---- Agenda slide (FIXED: scaled font + two columns for long agendas) ----
      const sections = data.sections || [];
      if (sections.length > 1) {
        const agenda = pptx.addSlide();
        agenda.background = { color: "FFFFFF" };
        agenda.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: PAGE_W, h: 1.1, fill: { color: ACCENT } });
        agenda.addText("Agenda", { x: 0.7, y: 0.15, w: 8, h: 0.8, fontSize: 28, bold: true, color: "FFFFFF", fontFace: "Arial", valign: "middle" });

        const { fontSize: agendaFontSize, paraSpaceAfter: agendaParaSpaceAfter } = fitAgendaFontSize(sections.length);
        const useTwoColumns = sections.length > 12;

        function agendaItems(list, offset) {
          return list.map((s, i) => ({
            text: `${i + 1 + offset}.  ${s.heading || ""}`,
            options: { breakLine: true, paraSpaceAfter: agendaParaSpaceAfter, color: TEXT },
          }));
        }

        if (useTwoColumns) {
          const colGap = 0.5;
          const colW = (PAGE_W - 1.4 - colGap) / 2;
          const splitAt = Math.ceil(sections.length / 2);
          const col1 = sections.slice(0, splitAt);
          const col2 = sections.slice(splitAt);
          agenda.addText(agendaItems(col1, 0), { x: 0.7, y: 1.5, w: colW, h: 5.6, fontSize: agendaFontSize, fontFace: "Arial", valign: "top" });
          agenda.addText(agendaItems(col2, splitAt), { x: 0.7 + colW + colGap, y: 1.5, w: colW, h: 5.6, fontSize: agendaFontSize, fontFace: "Arial", valign: "top" });
        } else {
          agenda.addText(agendaItems(sections, 0), { x: 1, y: 1.5, w: PAGE_W - 2, h: 5.6, fontSize: agendaFontSize, fontFace: "Arial", valign: "top" });
        }
        addFooter(agenda, 2);
      }

      // ---- Content slides ----
      sections.forEach((sec, idx) => {
        const slide = pptx.addSlide();
        slide.background = { color: "FFFFFF" };
        const heading = sec.heading || `Section ${idx + 1}`;
        const headingFontSize = heading.length > 45 ? 21 : 26; // shrink long headings so they don't wrap into the body area
        slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: PAGE_W, h: 1.3, fill: { color: ACCENT } });
        slide.addText(heading, {
          x: 0.7, y: 0.12, w: PAGE_W - 1.4, h: 1.06, fontSize: headingFontSize, bold: true, color: "FFFFFF", fontFace: "Arial", valign: "middle",
        });

        const items = sec.content || [];
        const { fontSize, paraSpaceAfter, lineSpacingMultiple } = fitBulletFontSize(items);
        const bulletItems = items.map((c) => ({
          text: c,
          options: { bullet: { code: "25CF", indent: 20 }, color: TEXT, breakLine: true, paraSpaceAfter },
        }));
        slide.addText(bulletItems, {
          x: 0.8, y: 1.75, w: PAGE_W - 1.6, h: 4.85, fontSize, fontFace: "Arial", valign: "top", lineSpacingMultiple,
        });

        addFooter(slide, idx + (sections.length > 1 ? 3 : 2));
      });

      // ---- Closing slide ----
      const closing = pptx.addSlide();
      closing.background = { color: ACCENT_DARK };
      closing.addText("Thank You", {
        x: 0.9, y: 3.1, w: PAGE_W - 1.8, h: 1.2, fontSize: 38, bold: true, color: "FFFFFF", align: "center", fontFace: "Arial",
      });

      await pptx.write("blob").then((blob) => downloadBlob(blob, `${safeFilename(data.title)}.pptx`));
    }

    async function generateDOCX(data, bannerDataUrl, footerText) {
      if (!window.docx) {
        throw new Error("docx library failed to load from the CDN (blocked by an ad-blocker, firewall, or CSP?). Reload the page and check the Network tab for unpkg.com.");
      }
      const {
        Document, Packer, Paragraph, HeadingLevel, ImageRun, TextRun,
        AlignmentType, Header, Footer, PageNumber, BorderStyle,
      } = window.docx;
      const children = [];

      if (bannerDataUrl) {
        const bytes = dataUrlToUint8Array(bannerDataUrl);
        // Size from the image's real aspect ratio (capped) instead of a fixed
        // 580x210, so a portrait photo isn't squashed/stretched into a wide box.
        const dims = await new Promise((resolve) => {
          const img = new Image();
          img.onload = () => resolve({ w: img.naturalWidth, h: img.naturalHeight });
          img.onerror = () => resolve({ w: 580, h: 210 });
          img.src = bannerDataUrl;
        });
        const maxW = 580, maxH = 260;
        let w = maxW, h = (dims.h * maxW) / dims.w;
        if (h > maxH) { h = maxH; w = (dims.w * maxH) / dims.h; }
        children.push(new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { after: 300 },
          children: [new ImageRun({ data: bytes, transformation: { width: Math.round(w), height: Math.round(h) } })],
        }));
      }

      children.push(new Paragraph({
        text: data.title || "Document",
        heading: HeadingLevel.TITLE,
        alignment: AlignmentType.CENTER,
        spacing: { after: data.subtitle ? 80 : 240 },
      }));

      if (data.subtitle) {
        children.push(new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { after: 240 },
          children: [new TextRun({ text: data.subtitle, italics: true, color: "83786C", size: 24 })],
        }));
      }

      children.push(new Paragraph({
        border: { bottom: { color: "D97757", space: 1, style: BorderStyle.SINGLE, size: 8 } },
        spacing: { after: 320 },
      }));

      (data.sections || []).forEach((sec, idx) => {
        children.push(new Paragraph({
          heading: HeadingLevel.HEADING_1,
          spacing: { before: idx === 0 ? 0 : 320, after: 140 },
          children: [new TextRun({ text: `${idx + 1}.  ${sec.heading || ""}`, color: "BF5E3F", bold: true })],
        }));
        (sec.content || []).forEach((item) => {
          children.push(new Paragraph({
            text: item,
            bullet: { level: 0 },
            spacing: { after: 110 },
          }));
        });
      });

      const footerChildren = [
        new Paragraph({
          alignment: AlignmentType.CENTER,
          border: { top: { color: "EAE5DC", space: 4, style: BorderStyle.SINGLE, size: 4 } },
          children: [
            ...(footerText ? [new TextRun({ text: footerText + "   |   Page ", size: 18, color: "83786C" })] : [new TextRun({ text: "Page ", size: 18, color: "83786C" })]),
            new TextRun({ children: [PageNumber.CURRENT], size: 18, color: "83786C" }),
          ],
        }),
      ];

      const doc = new Document({
        sections: [{
          headers: {
            default: new Header({
              children: [new Paragraph({
                alignment: AlignmentType.RIGHT,
                children: [new TextRun({ text: data.title || "", size: 16, color: "83786C" })],
              })],
            }),
          },
          footers: { default: new Footer({ children: footerChildren }) },
          children,
        }],
      });

      const blob = await Packer.toBlob(doc);
      downloadBlob(blob, `${safeFilename(data.title)}.docx`);
    }

    function generatePDF(data, bannerDataUrl, footerText) {
      if (!window.jspdf || !window.jspdf.jsPDF) {
        throw new Error("jsPDF failed to load from the CDN (blocked by an ad-blocker, firewall, or CSP?). Reload the page and check the Network tab for cdn.jsdelivr.net.");
      }
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      const marginX = 16;
      const ACCENT = [217, 119, 87];
      const ACCENT_DARK = [191, 94, 63];
      const TEXT = [45, 42, 38];
      const MUTED = [131, 120, 108];

      // ---- Header banner ----
      pdf.setFillColor(...ACCENT);
      pdf.rect(0, 0, pageWidth, data.subtitle ? 42 : 36, "F");
      pdf.setTextColor(255, 255, 255);
      pdf.setFontSize(21);
      pdf.setFont(undefined, "bold");
      pdf.text(data.title || "Document", marginX, 22);
      if (data.subtitle) {
        pdf.setFontSize(11);
        pdf.setFont(undefined, "italic");
        pdf.text(data.subtitle, marginX, 32);
      }

      let y = (data.subtitle ? 42 : 36) + 12;

      if (bannerDataUrl) {
        const props = pdf.getImageProperties(bannerDataUrl);
        const maxImgWidth = pageWidth - marginX * 2;
        const maxImgHeight = 70; // cap so a portrait photo can't cover most of the first page
        let imgWidth = maxImgWidth;
        let imgHeight = (props.height * imgWidth) / props.width;
        if (imgHeight > maxImgHeight) {
          imgHeight = maxImgHeight;
          imgWidth = (props.width * imgHeight) / props.height;
        }
        const imgX = marginX + (maxImgWidth - imgWidth) / 2; // center if width was capped
        const format = bannerDataUrl.includes("image/png") ? "PNG" : "JPEG";
        if (y + imgHeight > pageHeight - 30) { pdf.addPage(); y = 20; }
        pdf.addImage(bannerDataUrl, format, imgX, y, imgWidth, imgHeight);
        y += imgHeight + 12;
      }

      (data.sections || []).forEach((sec, idx) => {
        if (y > pageHeight - 45) { pdf.addPage(); y = 20; }

        pdf.setFontSize(15);
        pdf.setFont(undefined, "bold");
        pdf.setTextColor(...ACCENT_DARK);
        pdf.text(`${idx + 1}.  ${sec.heading || ""}`, marginX, y);
        y += 5;
        pdf.setDrawColor(...ACCENT);
        pdf.setLineWidth(0.7);
        pdf.line(marginX, y, marginX + 34, y);
        y += 9;

        pdf.setFontSize(11);
        pdf.setFont(undefined, "normal");
        pdf.setTextColor(...TEXT);

        (sec.content || []).forEach((item) => {
          const lines = pdf.splitTextToSize(item, pageWidth - marginX * 2 - 8);
          if (y + lines.length * 6 > pageHeight - 30) { pdf.addPage(); y = 20; }
          pdf.setFillColor(...ACCENT);
          pdf.circle(marginX + 1.4, y - 1.6, 1.1, "F");
          lines.forEach((line, i) => pdf.text(line, marginX + 6, y + i * 6));
          y += lines.length * 6 + 5;
        });
        y += 6;
      });

      const totalPages = pdf.internal.getNumberOfPages();
      for (let i = 1; i <= totalPages; i++) {
        pdf.setPage(i);
        pdf.setDrawColor(...MUTED);
        pdf.setLineWidth(0.2);
        pdf.line(marginX, pageHeight - 14, pageWidth - marginX, pageHeight - 14);
        pdf.setFontSize(8.5);
        pdf.setFont(undefined, "normal");
        pdf.setTextColor(...MUTED);
        if (footerText) pdf.text(footerText, marginX, pageHeight - 8);
        pdf.text(`Page ${i} of ${totalPages}`, pageWidth - marginX, pageHeight - 8, { align: "right" });
      }

      downloadBlob(pdf.output("blob"), `${safeFilename(data.title)}.pdf`);
    }

    async function loadModels() {
      modelsLoaded = false;
      try {
        const idToken = await currentUser.getIdToken();
        const res = await fetch(`${BACKEND_URL}/api/models`, {
          headers: { Authorization: `Bearer ${idToken}` },

        modelSelect.innerHTML = "";

        (data.models || []).forEach((m) => {

            groups[providerLabel] = optgroup;

    // ---------- Chat sessions (sidebar) ----------
    function chatsCol(uid) { return collection(db, "users", uid, "chats"); }
    function messagesCol(uid, chatId) { return collection(db, "users", uid, "chats", chatId, "messages"); }

    function renderChatItem(uid, docSnap) {
      const d = docSnap.data();
      const item = document.createElement("div");
      item.className = "chat-item" + (docSnap.id === currentChatId ? " active" : "");
      const titleSpan = document.createElement("span");
      titleSpan.className = "chat-title";
      titleSpan.textContent = d.title || "New chat";
      const delBtn = document.createElement("span");
      delBtn.className = "chat-delete";
      delBtn.title = "Delete";
      delBtn.setAttribute("role", "button");
      delBtn.setAttribute("aria-label", `Delete chat: ${d.title || "New chat"}`);
      delBtn.textContent = "✕";
      titleSpan.addEventListener("click", () => selectChat(uid, docSnap.id));
      delBtn.addEventListener("click", async (e) => {
        e.stopPropagation();
        await deleteDoc(doc(db, "users", uid, "chats", docSnap.id));
        await loadChatList(uid, { reset: true });
      });
      item.appendChild(titleSpan);
      item.appendChild(delBtn);
      return item;
    }

    // FIX: this used to hardcode limit(100) with no way to see older chats.
    // Now paginates with a "Load more" button, using the last doc as a
    // Firestore cursor (startAfter).
    async function loadChatList(uid, opts = {}) {
      const { reset = false } = opts;
      if (reset) {
        chatsLastDoc = null;
        chatsExhausted = false;
        chatListEl.innerHTML = "";
      }

      const constraints = [orderBy("updatedAt", "desc"), limit(CHATS_PAGE_SIZE)];
      if (chatsLastDoc) constraints.splice(1, 0, startAfter(chatsLastDoc));
      const q = query(chatsCol(uid), ...constraints);
      const snap = await getDocs(q);

      if (snap.empty && !chatsLastDoc) {
        await createNewChat(uid, true);
        return;
      }

      // Drop any existing "load more" button before appending this page —
      // it'll be re-added at the end if there's still more to load.
      const existingBtn = document.getElementById("loadMoreChatsBtn");
      if (existingBtn) existingBtn.remove();

      snap.forEach((docSnap) => {
        chatListEl.appendChild(renderChatItem(uid, docSnap));
      });

      if (!snap.empty) chatsLastDoc = snap.docs[snap.docs.length - 1];
      chatsExhausted = snap.size < CHATS_PAGE_SIZE;

      if (!chatsExhausted) {
        const btn = document.createElement("button");
        btn.id = "loadMoreChatsBtn";
        btn.textContent = "Load more chats";
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          btn.textContent = "Loading…";
          await loadChatList(uid, { reset: false });
        });
        chatListEl.appendChild(btn);
      }

      if (!currentChatId && snap.docs.length) {
        await selectChat(uid, snap.docs[0].id);
      }
    }

    async function createNewChat(uid, autoSelect) {
      const ref = doc(chatsCol(uid));
      await setDoc(ref, { title: "New chat", createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
      if (autoSelect !== false) {
        currentChatId = null;
        await loadChatList(uid, { reset: true });
      }
      return ref.id;
    }

    async function selectChat(uid, chatId) {
      if (activeController && activeRequestChatId !== chatId) {
        activeController.abort();
      }

      currentChatId = chatId;
      closeSidebar();
      chatWindow.innerHTML = "";
      history = [];
      messagesFirstDoc = null;
      messagesExhausted = false;

      await loadOlderMessages(uid, chatId, { initial: true });
      await loadChatList(uid, { reset: true });
    }

    async function loadOlderMessages(uid, chatId, opts = {}) {
      const { initial = false } = opts;
      const constraints = [orderBy("createdAt", "desc"), limit(MESSAGES_PAGE_SIZE)];
      if (messagesFirstDoc) constraints.splice(1, 0, startAfter(messagesFirstDoc));
      const q = query(messagesCol(uid, chatId), ...constraints);
      const snap = await getDocs(q);

      if (snap.empty) {
        messagesExhausted = true;
        if (loadMoreMessagesBtn) loadMoreMessagesBtn.remove();
        return;
      }

      const docsAsc = [...snap.docs].reverse();
      const scrollAnchor = chatWindow.scrollHeight - chatWindow.scrollTop;

      const fragment = document.createDocumentFragment();
      const newHistoryEntries = [];
      docsAsc.forEach((docSnap) => {
        const d = docSnap.data();
        const userRow = renderMessage("user", d.userMessage);
        const botRow = renderMessage("bot", d.reply);
        fragment.appendChild(userRow);
        fragment.appendChild(botRow);
        newHistoryEntries.push({ role: "user", content: d.userMessage }, { role: "assistant", content: d.reply });
      });

      if (initial) {
        chatWindow.appendChild(fragment);
        history = newHistoryEntries;
        chatWindow.scrollTop = chatWindow.scrollHeight;
      } else {
        chatWindow.insertBefore(fragment, chatWindow.firstChild);
        history = [...newHistoryEntries, ...history];
        chatWindow.scrollTop = chatWindow.scrollHeight - scrollAnchor;
      }

      messagesFirstDoc = snap.docs[snap.docs.length - 1];
      messagesExhausted = snap.size < MESSAGES_PAGE_SIZE;

      if (loadMoreMessagesBtn) loadMoreMessagesBtn.remove();
      if (!messagesExhausted) {
        loadMoreMessagesBtn = document.createElement("button");
        loadMoreMessagesBtn.id = "loadMoreMessagesBtn";
        loadMoreMessagesBtn.textContent = "Load older messages";
        loadMoreMessagesBtn.addEventListener("click", async () => {
          loadMoreMessagesBtn.disabled = true;
          loadMoreMessagesBtn.textContent = "Loading…";
          await loadOlderMessages(uid, chatId, { initial: false });
        });
        chatWindow.insertBefore(loadMoreMessagesBtn, chatWindow.firstChild);
      } else {
        loadMoreMessagesBtn = null;
      }
    }

    newChatBtn.addEventListener("click", async () => {
      if (!currentUser) return;
      const id = await createNewChat(currentUser.uid, false);
      await selectChat(currentUser.uid, id);
    });

    // ---------- Sending a message ----------
    async function send() {
      const text = messageInput.value.trim();
      if (!text || !currentUser) return;

      if (!currentChatId) {
        alert("Still setting up your chat — please try again in a moment.");
        return;
      }

      if (!modelsLoaded || !selectedModelId) {
        alert("Models are still loading (or failed to load) — please wait a moment and try again.");
        return;
      }

      const sendChatId = currentChatId;
      messageInput.value = "";
      messageInput.style.height = "auto";
      sendBtn.disabled = true;
      renderMessage("user", text);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      renderTyping();

      if (activeController) activeController.abort();
      const controller = new AbortController();
      activeController = controller;
      activeRequestChatId = sendChatId;

      let stream = null;
      let fullReply = "";

      try {
        const idToken = await currentUser.getIdToken();
        const res = await fetch(`${BACKEND_URL}/api/chat`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${idToken}`,
          },
          body: JSON.stringify({ message: text, history, modelId: selectedModelId }),
          signal: controller.signal,
        });

        if (!res.ok || !res.body) throw new Error(`Backend responded with ${res.status}`);

        const isStillActiveChat = () => currentChatId === sendChatId;

        removeTyping();
        stream = createStreamingBubble();

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed.startsWith("data:")) continue;
            const data = trimmed.slice(5).trim();
            if (!data) continue;
            let event;
            try { event = JSON.parse(data); } catch { continue; }

            if (!isStillActiveChat()) continue;

            if (event.type === "queued") {
              stream.setQueueStatus(event.position, event.total, event.estimatedWaitSeconds);
            } else if (event.type === "reasoning") {
              stream.appendReasoning(event.text);
            } else if (event.type === "content") {
              stream.appendContent(event.text);
              fullReply += event.text;
            } else if (event.type === "error") {
              fullReply += `\n[${event.message}]`;
              stream.appendContent(`\n${event.message}`);
            } else if (event.type === "done") {
              stream.finish();
            }
          }
        }

        if (!fullReply.trim()) {
          console.warn("Model returned an empty response (no content/error/done events carried any text). Check the Render backend logs for this request — the upstream model call likely failed silently or returned a non-streaming/unexpected response shape.");
          if (isStillActiveChat()) {
            stream.contentEl.innerHTML = renderMarkdown(
              "_The model didn't return any content. This can happen if the selected model is unavailable, misconfigured, or doesn't support streaming the way this app expects. Try again, or switch models from the dropdown above._"
            );
          }
        }

        const { displayText, exportData, wasTruncated } = parseExportBlock(fullReply);

        let finalExportData = exportData;
        let usedFallbackTemplate = false;
        if (!finalExportData && looksLikeDocumentRequest(text) && fullReply.trim()) {
          finalExportData = buildFallbackExportData(text, fullReply);
          usedFallbackTemplate = !!finalExportData;
          if (!finalExportData) {
            console.warn("Document request detected, but the reply had no headings/lists to build a fallback structure from.");
          }
        }

        if (isStillActiveChat()) {
          if (exportData) {
            let noteHtml = "";
            if (wasTruncated) {
              noteHtml = `<p style="color:var(--muted);font-size:0.82rem;font-style:italic;margin-top:8px;">⚠ The response was cut short (or a garbled line was removed), so this file may have fewer slides/sections/bullets than you asked for. Try asking for a shorter deck, or send the message again.</p>`;
            }
            stream.contentEl.innerHTML = renderMarkdown(displayText || "Here's what I put together:") + noteHtml;
            addExportBar(stream.bubbleEl, exportData);
          } else if (usedFallbackTemplate) {
            const noteHtml = `<p style="color:var(--muted);font-size:0.82rem;font-style:italic;margin-top:8px;">ℹ️ This model's reply wasn't pre-formatted for export, so the file below was auto-built from the headings and bullet points in its response above. Worth a quick check before you rely on it.</p>`;
            stream.contentEl.innerHTML = renderMarkdown(fullReply) + noteHtml;
            addExportBar(stream.bubbleEl, finalExportData);
          }
        }
        const cleanReply = exportData ? displayText : fullReply;

        const chatRef = doc(db, "users", currentUser.uid, "chats", sendChatId);
        await addDoc(messagesCol(currentUser.uid, sendChatId), {
          userMessage: text,
          reply: cleanReply,
          createdAt: serverTimestamp(),
        });

        if (isStillActiveChat()) {
          history.push({ role: "user", content: text });
          history.push({ role: "assistant", content: cleanReply });
        }

        const existingMsgsSnap = await getDocs(query(messagesCol(currentUser.uid, sendChatId), limit(2)));
        const isFirstMessage = existingMsgsSnap.size <= 1;
        await setDoc(
          chatRef,
          {
            updatedAt: serverTimestamp(),
            ...(isFirstMessage ? { title: text.slice(0, 40) + (text.length > 40 ? "…" : "") } : {}),
          },
          { merge: true }
        );
        if (isFirstMessage) await loadChatList(currentUser.uid, { reset: true });
      } catch (err) {
        if (err && err.name === "AbortError") {
          console.info("Request aborted (superseded by a newer action).");
        } else {
          console.error(err);
          removeTyping();
          if (stream) {
            stream.finish();
            if (currentChatId === sendChatId) {
              stream.contentEl.innerHTML = renderMarkdown("_Sorry, something went wrong sending that message. Your draft has been restored below — try again._");
            }
          } else if (currentChatId === sendChatId) {
            renderMessage("bot", "Sorry, something went wrong. Please try again.");
          }
          if (!messageInput.value) {
            messageInput.value = text;
            messageInput.style.height = "auto";
            messageInput.style.height = Math.min(messageInput.scrollHeight, 140) + "px";
          }
        }
      } finally {
        if (activeController === controller) activeController = null;
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
  </script>
</body>

</html>

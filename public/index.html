<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF9F5" />
  <title>NavGPT — Ask Naveen</title>
  <link rel="icon" href="/icons/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <style>
    :root {
      --bg: #FAF9F5;
      --panel: #FFFFFF;
      --accent: #D97757;
      --accent-dark: #BF5E3F;
      --accent-light: #F3E4DB;
      --text: #2D2A26;
      --muted: #83786C;
      --border: #EAE5DC;
      --border-soft: #F0ECE4;
      --shadow: 0 1px 2px rgba(45, 42, 38, 0.04), 0 2px 8px rgba(45, 42, 38, 0.04);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --sidebar-w: 260px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      -webkit-font-smoothing: antialiased;
    }

    /* ---------- Sidebar ---------- */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border-soft);
      display: flex;
      flex-direction: column;
      padding: calc(12px + var(--safe-top)) 10px 10px;
      transition: transform 0.22s ease;
      z-index: 30;
    }

    #newChatBtn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      font-family: inherit;
    }

    #newChatBtn:hover {
      background: var(--accent-dark);
    }

    #chatList {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .chat-item {
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .chat-item:hover {
      background: var(--border-soft);
    }

    .chat-item.active {
      background: var(--accent-light);
      color: var(--accent-dark);
      font-weight: 600;
    }

    .chat-item .chat-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item .chat-delete {
      opacity: 0;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 2px 5px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .chat-item:hover .chat-delete {
      opacity: 1;
    }

    .chat-item .chat-delete:hover {
      background: var(--border);
      color: var(--text);
    }

    #sidebarOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(45, 42, 38, 0.3);
      z-index: 20;
    }

    /* ---------- Main column ---------- */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    header {
      padding: calc(12px + var(--safe-top)) 20px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #menuBtn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      color: var(--text);
      font-size: 1.1rem;
      border-radius: 8px;
    }

    #menuBtn:hover {
      background: var(--border-soft);
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(191, 94, 63, 0.28);
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    header h1 {
      font-size: 1.02rem;
      margin: 0;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .icon-spin {
      animation: spin 1.3s linear infinite;
    }

    #modelSelect {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 10px;
      font-size: 0.82rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      cursor: pointer;
      max-width: 160px;
    }

    #modelSelect:focus {
      outline: none;
      border-color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #authArea button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: inherit;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    #authArea button:hover {
      background: var(--accent-dark);
    }

    #authArea button:active {
      transform: scale(0.97);
    }

    #signOutBtn {
      background: transparent !important;
      color: var(--muted) !important;
      border: 1px solid var(--border) !important;
      padding: 7px 14px !important;
    }

    #signOutBtn:hover {
      background: var(--border-soft) !important;
      color: var(--text) !important;
    }

    #userInfo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 500;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ---------- Chat window ---------- */
    #chatWindow {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 12px;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      margin-bottom: 18px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: rise 0.22s ease-out;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      justify-content: flex-end;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      margin-bottom: 2px;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      line-height: 1.55;
      white-space: pre-wrap;
      font-size: 0.95rem;
      word-wrap: break-word;
    }

    .msg.user .bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--panel);
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow);
      border-bottom-left-radius: 4px;
    }

    .export-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--border);
    }

    .export-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-light);
      color: var(--accent-dark);
      border: none;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease;
    }

    .export-btn:hover {
      background: var(--border);
    }

    .export-btn:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    .export-btn.attach-btn {
      background: transparent;
      color: var(--muted);
      border: 1px dashed var(--border);
    }

    .export-btn.attach-btn:hover {
      background: var(--border-soft);
      color: var(--text);
    }

    .export-btn.attach-btn.has-image {
      color: var(--accent-dark);
      border-style: solid;
      border-color: var(--border);
    }

    .export-footer-input {
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.8rem;
      font-family: inherit;
      color: var(--text);
      background: transparent;
      min-width: 180px;
      flex: 1;
    }

    .export-footer-input:focus {
      outline: none;
      border-color: var(--accent);
      border-style: solid;
      background: var(--bg);
    }

    .export-footer-input::placeholder {
      color: var(--muted);
    }

    .reasoning-block {
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px dashed var(--border);
      color: var(--muted);
      font-size: 0.85rem;
      font-style: italic;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    /* Rendered markdown inside bot replies */
    .content-text {
      white-space: normal;
    }

    .content-text>*:first-child {
      margin-top: 0;
    }

    .content-text>*:last-child {
      margin-bottom: 0;
    }

    .content-text p {
      margin: 0 0 10px;
    }

    .content-text h1,
    .content-text h2,
    .content-text h3 {
      margin: 16px 0 8px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }

    .content-text h1 {
      font-size: 1.25rem;
    }

    .content-text h2 {
      font-size: 1.12rem;
    }

    .content-text h3 {
      font-size: 1.02rem;
    }

    .content-text strong {
      font-weight: 700;
      color: var(--text);
    }

    .content-text em {
      font-style: italic;
    }

    .content-text ul,
    .content-text ol {
      margin: 0 0 10px;
      padding-left: 22px;
    }

    .content-text li {
      margin-bottom: 4px;
    }

    .content-text li>p {
      margin: 0;
    }

    .content-text a {
      color: var(--accent-dark);
      text-decoration: underline;
    }

    .content-text code {
      background: var(--border-soft);
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 0.85em;
      font-family: "SF Mono", Consolas, Monaco, monospace;
    }

    .content-text pre {
      background: #2D2A26;
      color: #FAF9F5;
      border-radius: 8px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 0 0 10px;
      font-size: 0.85em;
    }

    .content-text pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    .content-text blockquote {
      border-left: 3px solid var(--accent);
      margin: 0 0 10px;
      padding: 2px 0 2px 12px;
      color: var(--muted);
      font-style: italic;
    }

    .content-text hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    .content-text table {
      border-collapse: collapse;
      margin: 0 0 10px;
      font-size: 0.9em;
    }

    .content-text th,
    .content-text td {
      border: 1px solid var(--border);
      padding: 6px 10px;
    }

    .content-text th {
      background: var(--border-soft);
      font-weight: 600;
    }

    .reasoning-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent-dark);
      font-style: normal;
      display: block;
      margin-bottom: 4px;
    }

    .stream-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.9s steps(1) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 2px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.5;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.5;
      }

      30% {
        transform: translateY(-4px);
        opacity: 1;
      }
    }

    /* Queue status shown inside a bot bubble while a message waits its turn */
    .queue-status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .queue-status .queue-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .queue-status strong {
      color: var(--text);
      font-weight: 600;
    }

    #signedOutNotice {
      max-width: 420px;
      margin: 15vh auto 0;
      text-align: center;
      color: var(--muted);
      padding: 0 24px;
    }

    #signedOutNotice .empty-mark {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      overflow: hidden;
      margin: 0 auto 18px;
    }

    #signedOutNotice .empty-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #signedOutNotice h2 {
      color: var(--text);
      font-size: 1.15rem;
      margin: 0 0 8px;
      font-weight: 600;
    }

    #signedOutNotice p {
      font-size: 0.92rem;
      line-height: 1.5;
      margin: 0;
    }

    #inputBar {
      border-top: 1px solid var(--border-soft);
      background: var(--panel);
      padding: 14px 20px calc(14px + var(--safe-bottom));
      display: flex;
      gap: 10px;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #inputBar textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      line-height: 1.4;
      max-height: 140px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    #inputBar textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
      background: var(--panel);
    }

    #inputBar textarea::placeholder {
      color: var(--muted);
    }

    #inputBar button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0 20px;
      height: 42px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.92rem;
      font-family: inherit;
      flex-shrink: 0;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    #inputBar button:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    #inputBar button:active:not(:disabled) {
      transform: scale(0.96);
    }

    #inputBar button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #inputBar button:focus-visible,
    #authArea button:focus-visible,
    #inputBar textarea:focus-visible {
      outline: 2px solid var(--accent-dark);
      outline-offset: 2px;
    }

    #chatWindow::-webkit-scrollbar,
    #chatList::-webkit-scrollbar {
      width: 8px;
    }

    #chatWindow::-webkit-scrollbar-track,
    #chatList::-webkit-scrollbar-track {
      background: transparent;
    }

    #chatWindow::-webkit-scrollbar-thumb,
    #chatList::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    #chatWindow::-webkit-scrollbar-thumb:hover,
    #chatList::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    @media (max-width: 860px) {
      #sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        transform: translateX(-100%);
        box-shadow: 0 0 0 rgba(0, 0, 0, 0);
      }

      #sidebar.open {
        transform: translateX(0);
        box-shadow: 4px 0 24px rgba(45, 42, 38, 0.15);
      }

      #sidebarOverlay.open {
        display: block;
      }

      #menuBtn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
    }

    @media (max-width: 640px) {
      header {
        padding: calc(10px + var(--safe-top)) 14px 10px;
      }

      header h1 {
        font-size: 0.95rem;
      }

      #userInfo span {
        display: none;
      }

      #chatWindow {
        padding: 16px 14px 8px;
      }

      #inputBar {
        padding: 10px 12px calc(10px + var(--safe-bottom));
        gap: 8px;
      }

      .bubble {
        max-width: 84%;
        font-size: 0.93rem;
      }

      #inputBar button {
        padding: 0 16px;
        font-size: 0.88rem;
      }

      #signedOutNotice {
        margin-top: 10vh;
      }

      #modelSelect {
        max-width: 110px;
        font-size: 0.75rem;
      }
    }

    @media (min-width: 900px) {

      #chatWindow,
      #inputBar {
        max-width: 820px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .msg {
        animation: none;
      }

      .typing-dots span,
      .queue-status .queue-dot {
        animation: none;
        opacity: 0.6;
      }
    }
  </style>
  <!-- Document export libraries -->
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <!-- Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
</head>

<body>

  <div id="sidebarOverlay"></div>
  <div id="sidebar">
    <button id="newChatBtn">+ New chat</button>
    <div id="chatList"></div>
  </div>

  <div id="main">
    <header>
      <div class="brand">
        <button id="menuBtn" aria-label="Toggle chat list">☰</button>
        <div class="brand-mark" id="brandMark"><img src="/icons/icon-192.png" alt="NavGPT" /></div>
        <h1>NavGPT</h1>
      </div>
      <div class="header-right">
        <select id="modelSelect"></select>
        <div id="authArea"></div>
      </div>
    </header>

    <div id="chatWindow"></div>
    <div id="inputBar" style="display:none;">
      <textarea id="messageInput" rows="1" placeholder="Ask Naveen anything..."></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, query, orderBy, limit, getDocs, addDoc,
      doc, setDoc, deleteDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // URL of your Render backend (see render-backend/index.js).
    const BACKEND_URL = "https://navgpt-backend.onrender.com";

    const firebaseConfig = {
      apiKey: "AIzaSyBNn4wSs7yecfaAPmwPYbGNSVpELkD22fs",
      authDomain: "naveen-gpt.firebaseapp.com",
      projectId: "naveen-gpt",
      storageBucket: "naveen-gpt.firebasestorage.app",
      messagingSenderId: "1039081984469",
      appId: "1:1039081984469:web:00911e2678e60d3d1b6d5c"
    };

    const ICON_SRC = "/icons/icon-192.png";
    function iconImg(spin) {
      return `<img src="${ICON_SRC}" alt="NavGPT" class="${spin ? "icon-spin" : ""}" />`;
    }

    document.getElementById("brandMark").innerHTML = iconImg(false);
    marked.setOptions({ breaks: true, gfm: true });

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ================= Document export (PPTX / DOCX / PDF, optional banner) =================

    // Attempts to recover a valid JSON object from text that got cut off
    // mid-structure (e.g. the model's response hit a token limit before
    // finishing). Rolls back to the last complete element and closes any
    // still-open brackets/strings.
    function tryRepairTruncatedJson(text) {
      try { return JSON.parse(text); } catch { }

      let stack = [];
      let inString = false;
      let escape = false;
      let lastSafeIndex = -1;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inString) {
          if (escape) escape = false;
          else if (ch === "\\") escape = true;
          else if (ch === '"') inString = false;
          continue;
        }
        if (ch === '"') { inString = true; continue; }
        if (ch === "{" || ch === "[") { stack.push(ch); continue; }
        if (ch === "}" || ch === "]") { stack.pop(); continue; }
        if (ch === "," || ch === "}" || ch === "]") lastSafeIndex = i;
      }

      if (lastSafeIndex === -1) return null;
      let truncated = text.slice(0, lastSafeIndex + 1).replace(/,\s*$/, "");

      stack = [];
      inString = false;
      escape = false;
      for (let i = 0; i < truncated.length; i++) {
        const ch = truncated[i];
        if (inString) {
          if (escape) escape = false;
          else if (ch === "\\") escape = true;
          else if (ch === '"') inString = false;
          continue;
        }
        if (ch === '"') { inString = true; continue; }
        if (ch === "{" || ch === "[") stack.push(ch);
        else if (ch === "}" || ch === "]") stack.pop();
      }

      let closer = "";
      for (let i = stack.length - 1; i >= 0; i--) closer += stack[i] === "{" ? "}" : "]";

      try {
        return JSON.parse(truncated + closer);
      } catch (err) {
        console.error("JSON repair attempt failed:", err);
        return null;
      }
    }

    function parseExportBlock(fullText) {
      const startMarker = "```export-json";
      const startIdx = fullText.indexOf(startMarker);
      if (startIdx === -1) return { displayText: fullText, exportData: null };

      let jsonChunk = fullText.slice(startIdx + startMarker.length);
      const closeIdx = jsonChunk.indexOf("```");
      const blockEndInFullText = closeIdx === -1
        ? fullText.length
        : startIdx + startMarker.length + closeIdx + 3;
      if (closeIdx !== -1) jsonChunk = jsonChunk.slice(0, closeIdx);

      let exportData = null;
      let wasTruncated = closeIdx === -1;
      try {
        exportData = JSON.parse(jsonChunk.trim());
      } catch {
        exportData = tryRepairTruncatedJson(jsonChunk.trim());
        wasTruncated = true;
        if (exportData) {
          console.warn("Recovered a truncated export-json block (response may have hit a length limit).");
        } else {
          console.error("Could not parse or repair export-json block.");
        }
      }
      if (exportData && (!Array.isArray(exportData.sections) || exportData.sections.length === 0)) {
        exportData = null; // not usable even if syntactically valid
      }

      const displayText = (fullText.slice(0, startIdx) + fullText.slice(blockEndInFullText)).trim();
      return { displayText, exportData, wasTruncated: wasTruncated && !!exportData };
    }

    function downloadBlob(blob, filename) {
      if (window.AndroidDownloader && window.AndroidDownloader.saveBase64File) {
        const reader = new FileReader();
        reader.onload = () => {
          const base64 = reader.result.split(",")[1];
          window.AndroidDownloader.saveBase64File(filename, base64, blob.type || "application/octet-stream");
        };
        reader.readAsDataURL(blob);
        return;
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function dataUrlToUint8Array(dataUrl) {
      const base64 = dataUrl.split(",")[1];
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function safeFilename(title) {
      return (title || "document").replace(/[^a-z0-9\-_ ]/gi, "").trim().slice(0, 60) || "document";
    }

    async function generatePPTX(data, bannerDataUrl, footerText) {
      const pptx = new window.PptxGenJS();
      pptx.layout = "LAYOUT_WIDE"; // 13.33 x 7.5 in

      const ACCENT = "D97757";
      const ACCENT_DARK = "BF5E3F";
      const TEXT = "2D2A26";
      const MUTED = "83786C";
      const CREAM = "FAF9F5";
      const PAGE_W = 13.33, PAGE_H = 7.5;

      function addFooter(slide, pageNum) {
        if (footerText) {
          slide.addText(footerText, {
            x: 0.5, y: PAGE_H - 0.45, w: 8, h: 0.35, fontSize: 10, color: MUTED, fontFace: "Arial",
          });
        }
        slide.addText(String(pageNum), {
          x: PAGE_W - 1.1, y: PAGE_H - 0.45, w: 0.6, h: 0.35, fontSize: 10, color: MUTED, align: "right", fontFace: "Arial",
        });
      }

      // ---- Title slide ----
      const titleSlide = pptx.addSlide();
      titleSlide.background = { color: ACCENT };
      if (bannerDataUrl) {
        titleSlide.addImage({ data: bannerDataUrl, x: 0, y: 0, w: PAGE_W, h: PAGE_H, sizing: { type: "cover", w: PAGE_W, h: PAGE_H } });
        titleSlide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: PAGE_W, h: PAGE_H, fill: { color: "000000", transparency: 45 } });
      }
      titleSlide.addText(data.title || "Presentation", {
        x: 0.9, y: 2.9, w: PAGE_W - 1.8, h: 1.5, fontSize: 40, bold: true, color: "FFFFFF", align: "center", fontFace: "Arial",
      });
      if (data.subtitle) {
        titleSlide.addText(data.subtitle, {
          x: 0.9, y: 4.35, w: PAGE_W - 1.8, h: 0.7, fontSize: 18, italic: true, color: "FFFFFF", align: "center", fontFace: "Arial",
        });
      }

      // ---- Agenda slide ----
      const sections = data.sections || [];
      if (sections.length > 1) {
        const agenda = pptx.addSlide();
        agenda.background = { color: CREAM };
        agenda.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: PAGE_W, h: 1.1, fill: { color: ACCENT } });
        agenda.addText("Agenda", { x: 0.7, y: 0.15, w: 8, h: 0.8, fontSize: 28, bold: true, color: "FFFFFF", fontFace: "Arial", valign: "middle" });
        const items = sections.map((s, i) => ({
          text: `${i + 1}.  ${s.heading || ""}`,
          options: { breakLine: true, paraSpaceAfter: 14, color: TEXT },
        }));
        agenda.addText(items, { x: 1, y: 1.8, w: PAGE_W - 2, h: 5, fontSize: 20, fontFace: "Arial" });
        addFooter(agenda, 2);
      }

      // ---- Content slides ----
      sections.forEach((sec, idx) => {
        const slide = pptx.addSlide();
        slide.background = { color: "FFFFFF" };
        slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: PAGE_W, h: 1.1, fill: { color: ACCENT } });
        slide.addText(sec.heading || `Section ${idx + 1}`, {
          x: 0.7, y: 0.15, w: PAGE_W - 1.4, h: 0.8, fontSize: 26, bold: true, color: "FFFFFF", fontFace: "Arial", valign: "middle",
        });

        const bulletItems = (sec.content || []).map((c) => ({
          text: c,
          options: { bullet: { code: "25CF", indent: 20 }, color: TEXT, breakLine: true, paraSpaceAfter: 16 },
        }));
        slide.addText(bulletItems, {
          x: 0.8, y: 1.55, w: PAGE_W - 1.6, h: 5.2, fontSize: 17, fontFace: "Arial", valign: "top", lineSpacingMultiple: 1.15,
        });

        addFooter(slide, idx + (sections.length > 1 ? 3 : 2));
      });

      // ---- Closing slide ----
      const closing = pptx.addSlide();
      closing.background = { color: ACCENT_DARK };
      closing.addText("Thank You", {
        x: 0.9, y: 3.1, w: PAGE_W - 1.8, h: 1.2, fontSize: 38, bold: true, color: "FFFFFF", align: "center", fontFace: "Arial",
      });

      await pptx.write("blob").then((blob) => downloadBlob(blob, `${safeFilename(data.title)}.pptx`));
    }

    async function generateDOCX(data, bannerDataUrl, footerText) {
      const {
        Document, Packer, Paragraph, HeadingLevel, ImageRun, TextRun,
        AlignmentType, Header, Footer, PageNumber, BorderStyle,
      } = window.docx;
      const children = [];

      if (bannerDataUrl) {
        const bytes = dataUrlToUint8Array(bannerDataUrl);
        children.push(new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { after: 300 },
          children: [new ImageRun({ data: bytes, transformation: { width: 580, height: 210 } })],
        }));
      }

      children.push(new Paragraph({
        text: data.title || "Document",
        heading: HeadingLevel.TITLE,
        alignment: AlignmentType.CENTER,
        spacing: { after: data.subtitle ? 80 : 240 },
      }));

      if (data.subtitle) {
        children.push(new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { after: 240 },
          children: [new TextRun({ text: data.subtitle, italics: true, color: "83786C", size: 24 })],
        }));
      }

      children.push(new Paragraph({
        border: { bottom: { color: "D97757", space: 1, style: BorderStyle.SINGLE, size: 8 } },
        spacing: { after: 320 },
      }));

      (data.sections || []).forEach((sec, idx) => {
        children.push(new Paragraph({
          heading: HeadingLevel.HEADING_1,
          spacing: { before: idx === 0 ? 0 : 320, after: 140 },
          children: [new TextRun({ text: `${idx + 1}.  ${sec.heading || ""}`, color: "BF5E3F", bold: true })],
        }));
        (sec.content || []).forEach((item) => {
          children.push(new Paragraph({
            text: item,
            bullet: { level: 0 },
            spacing: { after: 110 },
          }));
        });
      });

      const footerChildren = [
        new Paragraph({
          alignment: AlignmentType.CENTER,
          border: { top: { color: "EAE5DC", space: 4, style: BorderStyle.SINGLE, size: 4 } },
          children: [
            ...(footerText ? [new TextRun({ text: footerText + "   |   Page ", size: 18, color: "83786C" })] : [new TextRun({ text: "Page ", size: 18, color: "83786C" })]),
            new TextRun({ children: [PageNumber.CURRENT], size: 18, color: "83786C" }),
          ],
        }),
      ];

      const doc = new Document({
        sections: [{
          headers: {
            default: new Header({
              children: [new Paragraph({
                alignment: AlignmentType.RIGHT,
                children: [new TextRun({ text: data.title || "", size: 16, color: "83786C" })],
              })],
            }),
          },
          footers: { default: new Footer({ children: footerChildren }) },
          children,
        }],
      });

      const blob = await Packer.toBlob(doc);
      downloadBlob(blob, `${safeFilename(data.title)}.docx`);
    }

    function generatePDF(data, bannerDataUrl, footerText) {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      const marginX = 16;
      const ACCENT = [217, 119, 87];
      const ACCENT_DARK = [191, 94, 63];
      const TEXT = [45, 42, 38];
      const MUTED = [131, 120, 108];

      // ---- Header banner ----
      pdf.setFillColor(...ACCENT);
      pdf.rect(0, 0, pageWidth, data.subtitle ? 42 : 36, "F");
      pdf.setTextColor(255, 255, 255);
      pdf.setFontSize(21);
      pdf.setFont(undefined, "bold");
      pdf.text(data.title || "Document", marginX, 22);
      if (data.subtitle) {
        pdf.setFontSize(11);
        pdf.setFont(undefined, "italic");
        pdf.text(data.subtitle, marginX, 32);
      }

      let y = (data.subtitle ? 42 : 36) + 12;

      if (bannerDataUrl) {
        const props = pdf.getImageProperties(bannerDataUrl);
        const imgWidth = pageWidth - marginX * 2;
        const imgHeight = (props.height * imgWidth) / props.width;
        const format = bannerDataUrl.includes("image/png") ? "PNG" : "JPEG";
        if (y + imgHeight > pageHeight - 30) { pdf.addPage(); y = 20; }
        pdf.addImage(bannerDataUrl, format, marginX, y, imgWidth, imgHeight);
        y += imgHeight + 12;
      }

      (data.sections || []).forEach((sec, idx) => {
        if (y > pageHeight - 45) { pdf.addPage(); y = 20; }

        pdf.setFontSize(15);
        pdf.setFont(undefined, "bold");
        pdf.setTextColor(...ACCENT_DARK);
        pdf.text(`${idx + 1}.  ${sec.heading || ""}`, marginX, y);
        y += 5;
        pdf.setDrawColor(...ACCENT);
        pdf.setLineWidth(0.7);
        pdf.line(marginX, y, marginX + 34, y);
        y += 9;

        pdf.setFontSize(11);
        pdf.setFont(undefined, "normal");
        pdf.setTextColor(...TEXT);

        (sec.content || []).forEach((item) => {
          const lines = pdf.splitTextToSize(item, pageWidth - marginX * 2 - 8);
          if (y + lines.length * 6 > pageHeight - 30) { pdf.addPage(); y = 20; }
          pdf.setFillColor(...ACCENT);
          pdf.circle(marginX + 1.4, y - 1.6, 1.1, "F");
          lines.forEach((line, i) => pdf.text(line, marginX + 6, y + i * 6));
          y += lines.length * 6 + 5;
        });
        y += 6;
      });

      const totalPages = pdf.internal.getNumberOfPages();
      for (let i = 1; i <= totalPages; i++) {
        pdf.setPage(i);
        pdf.setDrawColor(...MUTED);
        pdf.setLineWidth(0.2);
        pdf.line(marginX, pageHeight - 14, pageWidth - marginX, pageHeight - 14);
        pdf.setFontSize(8.5);
        pdf.setFont(undefined, "normal");
        pdf.setTextColor(...MUTED);
        if (footerText) pdf.text(footerText, marginX, pageHeight - 8);
        pdf.text(`Page ${i} of ${totalPages}`, pageWidth - marginX, pageHeight - 8, { align: "right" });
      }

      downloadBlob(pdf.output("blob"), `${safeFilename(data.title)}.pdf`);
    }

    // ---------- Chat sessions (sidebar) ----------
    function chatsCol(uid) { return collection(db, "users", uid, "chats"); }
    function messagesCol(uid, chatId) { return collection(db, "users", uid, "chats", chatId, "messages"); }

    async function loadChatList(uid) {
      const q = query(chatsCol(uid), orderBy("updatedAt", "desc"), limit(100));
      const snap = await getDocs(q);
      chatListEl.innerHTML = "";
      if (snap.empty) {
        await createNewChat(uid, true);
        return;
      }
      snap.forEach((docSnap) => {
        const d = docSnap.data();
        const item = document.createElement("div");
        item.className = "chat-item" + (docSnap.id === currentChatId ? " active" : "");
        item.innerHTML = `<span class="chat-title">${d.title || "New chat"}</span><span class="chat-delete" title="Delete">✕</span>`;
        item.querySelector(".chat-title").addEventListener("click", () => selectChat(uid, docSnap.id));
        item.querySelector(".chat-delete").addEventListener("click", async (e) => {
          e.stopPropagation();
          await deleteDoc(doc(db, "users", uid, "chats", docSnap.id));
          await loadChatList(uid);
        });
        chatListEl.appendChild(item);
      });
      if (!currentChatId) {
        const first = snap.docs[0];
        await selectChat(uid, first.id);
      }
    }

    async function createNewChat(uid, autoSelect) {
      const ref = doc(chatsCol(uid));
      await setDoc(ref, { title: "New chat", createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
      if (autoSelect !== false) {
        await loadChatList(uid);
      }
      return ref.id;
    }

    async function selectChat(uid, chatId) {
      currentChatId = chatId;
      closeSidebar();
      chatWindow.innerHTML = "";
      history = [];
      document.querySelectorAll(".chat-item").forEach((el) => el.classList.remove("active"));

      const q = query(messagesCol(uid, chatId), orderBy("createdAt", "asc"), limit(100));
      const snap = await getDocs(q);
      snap.forEach((docSnap) => {
        const d = docSnap.data();
        renderMessage("user", d.userMessage);
        renderMessage("bot", d.reply);
        history.push({ role: "user", content: d.userMessage });
        history.push({ role: "assistant", content: d.reply });
      });
      await loadChatList(uid); // refresh active highlight
    }

    newChatBtn.addEventListener("click", async () => {
      if (!currentUser) return;
      const id = await createNewChat(currentUser.uid, false);
      await selectChat(currentUser.uid, id);
    });

    // ---------- Auth ----------
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        authArea.innerHTML = `
        <div id="userInfo">
          <div class="user-avatar">${initials(user.displayName || user.email)}</div>
          <span>${user.displayName || user.email}</span>
          <button id="signOutBtn">Sign out</button>
        </div>`;
        document.getElementById("signOutBtn").onclick = () => signOut(auth);
        inputBar.style.display = "flex";
        currentChatId = null;
        await loadModels();
        await loadChatList(user.uid);
      } else {
        authArea.innerHTML = `<button id="signInBtn">Sign in with Google</button>`;
        document.getElementById("signInBtn").onclick = () =>
          signInWithPopup(auth, new GoogleAuthProvider());
        inputBar.style.display = "none";
        chatListEl.innerHTML = "";
        modelSelect.innerHTML = "";
        chatWindow.innerHTML = `
        <div id="signedOutNotice">
          <div class="empty-mark" id="emptyMark"></div>
          <h2>Welcome to NavGPT</h2>
          <p>Sign in to start chatting with Naveen — your conversation history is saved to your account.</p>
        </div>`;
        document.getElementById("emptyMark").innerHTML = iconImg(false);
      }
    });

    // ---------- Sending a message ----------
    async function send() {
      const text = messageInput.value.trim();
      if (!text || !currentUser || !currentChatId) return;
      messageInput.value = "";
      messageInput.style.height = "auto";
      sendBtn.disabled = true;
      renderMessage("user", text);
      renderTyping();

      let stream = null;
      let fullReply = "";

      try {
        const idToken = await currentUser.getIdToken();
        const res = await fetch(`${BACKEND_URL}/api/chat`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${idToken}`,
          },
          body: JSON.stringify({ message: text, history, modelId: selectedModelId }),
        });

        if (!res.ok || !res.body) throw new Error(`Backend responded with ${res.status}`);

        removeTyping();
        stream = createStreamingBubble();

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed.startsWith("data:")) continue;
            const data = trimmed.slice(5).trim();
            if (!data) continue;
            let event;
            try { event = JSON.parse(data); } catch { continue; }

            if (event.type === "queued") {
              stream.setQueueStatus(event.position, event.total, event.estimatedWaitSeconds);
            } else if (event.type === "reasoning") {
              stream.appendReasoning(event.text);
            } else if (event.type === "content") {
              stream.appendContent(event.text);
              fullReply += event.text;
            } else if (event.type === "error") {
              fullReply += `\n[${event.message}]`;
              stream.appendContent(`\n${event.message}`);
            } else if (event.type === "done") {
              stream.finish();
            }
          }
        }

        const { displayText, exportData, wasTruncated } = parseExportBlock(fullReply);
        if (exportData) {
          let noteHtml = "";
          if (wasTruncated) {
            noteHtml = `<p style="color:var(--muted);font-size:0.82rem;font-style:italic;margin-top:8px;">⚠ The response was cut short, so this file may have fewer slides/sections than you asked for. Try asking for a shorter deck, or send the message again.</p>`;
          }
          stream.contentEl.innerHTML = renderMarkdown(displayText || "Here's what I put together:") + noteHtml;
          addExportBar(stream.bubbleEl, exportData);
        }
        const cleanReply = exportData ? displayText : fullReply;

        history.push({ role: "user", content: text });
        history.push({ role: "assistant", content: cleanReply });

        const chatRef = doc(db, "users", currentUser.uid, "chats", currentChatId);
        await addDoc(messagesCol(currentUser.uid, currentChatId), {
          userMessage: text,
          reply: cleanReply,
          createdAt: serverTimestamp(),
        });

        const isFirstMessage = history.length <= 2;
        await setDoc(
          chatRef,
          {
            updatedAt: serverTimestamp(),
            ...(isFirstMessage ? { title: text.slice(0, 40) + (text.length > 40 ? "…" : "") } : {}),
          },
          { merge: true }
        );
        if (isFirstMessage) await loadChatList(currentUser.uid);
      } catch (err) {
        console.error(err);
        removeTyping();
        if (stream) {
          stream.finish();
        } else {
          renderMessage("bot", "Sorry, something went wrong. Please try again.");
        }
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
  </script>
</body>

</html>

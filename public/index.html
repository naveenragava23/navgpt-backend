<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF9F5" />
  <title>NavGPT — Ask Naveen</title>
  <style>
    :root {
      --bg: #FAF9F5;
      --panel: #FFFFFF;
      --accent: #D97757;
      --accent-dark: #BF5E3F;
      --accent-light: #F3E4DB;
      --text: #2D2A26;
      --muted: #83786C;
      --border: #EAE5DC;
      --border-soft: #F0ECE4;
      --shadow: 0 1px 2px rgba(45, 42, 38, 0.04), 0 2px 8px rgba(45, 42, 38, 0.04);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --sidebar-w: 260px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      -webkit-font-smoothing: antialiased;
    }

    /* ---------- Sidebar ---------- */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border-soft);
      display: flex;
      flex-direction: column;
      padding: calc(12px + var(--safe-top)) 10px 10px;
      transition: transform 0.22s ease;
      z-index: 30;
    }

    #newChatBtn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      font-family: inherit;
    }

    #newChatBtn:hover {
      background: var(--accent-dark);
    }

    #chatList {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .chat-item {
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .chat-item:hover {
      background: var(--border-soft);
    }

    .chat-item.active {
      background: var(--accent-light);
      color: var(--accent-dark);
      font-weight: 600;
    }

    .chat-item .chat-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item .chat-delete {
      opacity: 0;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 2px 5px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .chat-item:hover .chat-delete {
      opacity: 1;
    }

    .chat-item .chat-delete:hover {
      background: var(--border);
      color: var(--text);
    }

    #sidebarOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(45, 42, 38, 0.3);
      z-index: 20;
    }

    /* ---------- Main column ---------- */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    header {
      padding: calc(12px + var(--safe-top)) 20px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #menuBtn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      color: var(--text);
      font-size: 1.1rem;
      border-radius: 8px;
    }

    #menuBtn:hover {
      background: var(--border-soft);
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(191, 94, 63, 0.28);
    }

    header h1 {
      font-size: 1.02rem;
      margin: 0;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    #modelSelect {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 10px;
      font-size: 0.82rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      cursor: pointer;
      max-width: 160px;
    }

    #modelSelect:focus {
      outline: none;
      border-color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #authArea button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: inherit;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    #authArea button:hover {
      background: var(--accent-dark);
    }

    #authArea button:active {
      transform: scale(0.97);
    }

    #signOutBtn {
      background: transparent !important;
      color: var(--muted) !important;
      border: 1px solid var(--border) !important;
      padding: 7px 14px !important;
    }

    #signOutBtn:hover {
      background: var(--border-soft) !important;
      color: var(--text) !important;
    }

    #userInfo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 500;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ---------- Chat window ---------- */
    #chatWindow {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 12px;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      margin-bottom: 18px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: rise 0.22s ease-out;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      justify-content: flex-end;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      margin-bottom: 2px;
    }

    .msg.bot .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      line-height: 1.55;
      white-space: pre-wrap;
      font-size: 0.95rem;
      word-wrap: break-word;
    }

    .msg.user .bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--panel);
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow);
      border-bottom-left-radius: 4px;
    }

    .reasoning-block {
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px dashed var(--border);
      color: var(--muted);
      font-size: 0.85rem;
      font-style: italic;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .reasoning-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent-dark);
      font-style: normal;
      display: block;
      margin-bottom: 4px;
    }

    .stream-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.9s steps(1) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 2px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.5;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.5;
      }

      30% {
        transform: translateY(-4px);
        opacity: 1;
      }
    }

    #signedOutNotice {
      max-width: 420px;
      margin: 15vh auto 0;
      text-align: center;
      color: var(--muted);
      padding: 0 24px;
    }

    #signedOutNotice .empty-mark {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 18px;
    }

    #signedOutNotice h2 {
      color: var(--text);
      font-size: 1.15rem;
      margin: 0 0 8px;
      font-weight: 600;
    }

    #signedOutNotice p {
      font-size: 0.92rem;
      line-height: 1.5;
      margin: 0;
    }

    #inputBar {
      border-top: 1px solid var(--border-soft);
      background: var(--panel);
      padding: 14px 20px calc(14px + var(--safe-bottom));
      display: flex;
      gap: 10px;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #inputBar textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      line-height: 1.4;
      max-height: 140px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    #inputBar textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
      background: var(--panel);
    }

    #inputBar textarea::placeholder {
      color: var(--muted);
    }

    #inputBar button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0 20px;
      height: 42px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.92rem;
      font-family: inherit;
      flex-shrink: 0;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    #inputBar button:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    #inputBar button:active:not(:disabled) {
      transform: scale(0.96);
    }

    #inputBar button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #inputBar button:focus-visible,
    #authArea button:focus-visible,
    #inputBar textarea:focus-visible {
      outline: 2px solid var(--accent-dark);
      outline-offset: 2px;
    }

    #chatWindow::-webkit-scrollbar,
    #chatList::-webkit-scrollbar {
      width: 8px;
    }

    #chatWindow::-webkit-scrollbar-track,
    #chatList::-webkit-scrollbar-track {
      background: transparent;
    }

    #chatWindow::-webkit-scrollbar-thumb,
    #chatList::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    #chatWindow::-webkit-scrollbar-thumb:hover,
    #chatList::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    @media (max-width: 860px) {
      #sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        transform: translateX(-100%);
        box-shadow: 0 0 0 rgba(0, 0, 0, 0);
      }

      #sidebar.open {
        transform: translateX(0);
        box-shadow: 4px 0 24px rgba(45, 42, 38, 0.15);
      }

      #sidebarOverlay.open {
        display: block;
      }

      #menuBtn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
    }

    @media (max-width: 640px) {
      header {
        padding: calc(10px + var(--safe-top)) 14px 10px;
      }

      header h1 {
        font-size: 0.95rem;
      }

      #userInfo span {
        display: none;
      }

      #chatWindow {
        padding: 16px 14px 8px;
      }

      #inputBar {
        padding: 10px 12px calc(10px + var(--safe-bottom));
        gap: 8px;
      }

      .bubble {
        max-width: 84%;
        font-size: 0.93rem;
      }

      #inputBar button {
        padding: 0 16px;
        font-size: 0.88rem;
      }

      #signedOutNotice {
        margin-top: 10vh;
      }

      #modelSelect {
        max-width: 110px;
        font-size: 0.75rem;
      }
    }

    @media (min-width: 900px) {

      #chatWindow,
      #inputBar {
        max-width: 820px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .msg {
        animation: none;
      }

      .typing-dots span {
        animation: none;
        opacity: 0.6;
      }
    }
  </style>
</head>

<body>

  <div id="sidebarOverlay"></div>
  <div id="sidebar">
    <button id="newChatBtn">+ New chat</button>
    <div id="chatList"></div>
  </div>

  <div id="main">
    <header>
      <div class="brand">
        <button id="menuBtn" aria-label="Toggle chat list">☰</button>
        <div class="brand-mark">📚</div>
        <h1>NavGPT</h1>
      </div>
      <div class="header-right">
        <select id="modelSelect"></select>
        <div id="authArea"></div>
      </div>
    </header>

    <div id="chatWindow"></div>
    <div id="inputBar" style="display:none;">
      <textarea id="messageInput" rows="1" placeholder="Ask Naveen anything..."></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, query, orderBy, limit, getDocs, addDoc,
      doc, setDoc, deleteDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // URL of your Render backend (see render-backend/index.js).
    const BACKEND_URL = "https://navgpt-backend.onrender.com";

    const firebaseConfig = {
      apiKey: "AIzaSyBNn4wSs7yecfaAPmwPYbGNSVpELkD22fs",
      authDomain: "naveen-gpt.firebaseapp.com",
      projectId: "naveen-gpt",
      storageBucket: "naveen-gpt.firebasestorage.app",
      messagingSenderId: "1039081984469",
      appId: "1:1039081984469:web:00911e2678e60d3d1b6d5c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const authArea = document.getElementById("authArea");
    const chatWindow = document.getElementById("chatWindow");
    const inputBar = document.getElementById("inputBar");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const sidebar = document.getElementById("sidebar");
    const sidebarOverlay = document.getElementById("sidebarOverlay");
    const menuBtn = document.getElementById("menuBtn");
    const newChatBtn = document.getElementById("newChatBtn");
    const chatListEl = document.getElementById("chatList");
    const modelSelect = document.getElementById("modelSelect");

    let history = [];
    let currentUser = null;
    let currentChatId = null;
    let selectedModelId = null;

    function initials(nameOrEmail) {
      if (!nameOrEmail) return "?";
      const parts = nameOrEmail.trim().split(" ");
      if (parts.length > 1) return (parts[0][0] + parts[1][0]).toUpperCase();
      return nameOrEmail[0].toUpperCase();
    }

    // ---------- Sidebar toggle (mobile) ----------
    function openSidebar() { sidebar.classList.add("open"); sidebarOverlay.classList.add("open"); }
    function closeSidebar() { sidebar.classList.remove("open"); sidebarOverlay.classList.remove("open"); }
    menuBtn.addEventListener("click", () => sidebar.classList.contains("open") ? closeSidebar() : openSidebar());
    sidebarOverlay.addEventListener("click", closeSidebar);

    // ---------- Message rendering ----------
    function renderMessage(role, content) {
      const row = document.createElement("div");
      row.className = `msg ${role === "user" ? "user" : "bot"}`;
      if (role !== "user") {
        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = "📚";
        row.appendChild(avatar);
      }
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = content;
      row.appendChild(bubble);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return row;
    }

    function renderTyping() {
      const row = document.createElement("div");
      row.className = "msg bot";
      row.id = "typingRow";
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = "📚";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
      row.appendChild(avatar);
      row.appendChild(bubble);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }
    function removeTyping() {
      const row = document.getElementById("typingRow");
      if (row) row.remove();
    }

    function createStreamingBubble() {
      const row = document.createElement("div");
      row.className = "msg bot";
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = "📚";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      const reasoningDiv = document.createElement("div");
      reasoningDiv.className = "reasoning-block";
      reasoningDiv.style.display = "none";
      reasoningDiv.innerHTML = `<span class="reasoning-label">Thinking</span><span class="reasoning-text"></span>`;
      const contentDiv = document.createElement("div");
      contentDiv.className = "content-text";
      const cursor = document.createElement("span");
      cursor.className = "stream-cursor";
      bubble.appendChild(reasoningDiv);
      bubble.appendChild(contentDiv);
      contentDiv.appendChild(cursor);
      row.appendChild(avatar);
      row.appendChild(bubble);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return {
        appendReasoning(text) {
          reasoningDiv.style.display = "block";
          reasoningDiv.querySelector(".reasoning-text").textContent += text;
          chatWindow.scrollTop = chatWindow.scrollHeight;
        },
        appendContent(text) {
          contentDiv.insertBefore(document.createTextNode(text), cursor);
          chatWindow.scrollTop = chatWindow.scrollHeight;
        },
        finish() { cursor.remove(); },
      };
    }

    messageInput.addEventListener("input", () => {
      messageInput.style.height = "auto";
      messageInput.style.height = Math.min(messageInput.scrollHeight, 140) + "px";
    });

    // ---------- Model dropdown ----------
    async function loadModels() {
      try {
        const idToken = await currentUser.getIdToken();
        const res = await fetch(`${BACKEND_URL}/api/models`, {
          headers: { Authorization: `Bearer ${idToken}` },
        });
        const data = await res.json();
        modelSelect.innerHTML = "";
        (data.models || []).forEach((m) => {
          const opt = document.createElement("option");
          opt.value = m.id;
          opt.textContent = m.label;
          modelSelect.appendChild(opt);
        });
        if (data.models && data.models.length) selectedModelId = data.models[0].id;
      } catch (err) {
        console.error("Failed to load models:", err);
        modelSelect.innerHTML = `<option>Default</option>`;
      }
    }
    modelSelect.addEventListener("change", () => { selectedModelId = modelSelect.value; });

    // ---------- Chat sessions (sidebar) ----------
    function chatsCol(uid) { return collection(db, "users", uid, "chats"); }
    function messagesCol(uid, chatId) { return collection(db, "users", uid, "chats", chatId, "messages"); }

    async function loadChatList(uid) {
      const q = query(chatsCol(uid), orderBy("updatedAt", "desc"), limit(100));
      const snap = await getDocs(q);
      chatListEl.innerHTML = "";
      if (snap.empty) {
        await createNewChat(uid, true);
        return;
      }
      snap.forEach((docSnap) => {
        const d = docSnap.data();
        const item = document.createElement("div");
        item.className = "chat-item" + (docSnap.id === currentChatId ? " active" : "");
        item.innerHTML = `<span class="chat-title">${d.title || "New chat"}</span><span class="chat-delete" title="Delete">✕</span>`;
        item.querySelector(".chat-title").addEventListener("click", () => selectChat(uid, docSnap.id));
        item.querySelector(".chat-delete").addEventListener("click", async (e) => {
          e.stopPropagation();
          await deleteDoc(doc(db, "users", uid, "chats", docSnap.id));
          await loadChatList(uid);
        });
        chatListEl.appendChild(item);
      });
      if (!currentChatId) {
        const first = snap.docs[0];
        await selectChat(uid, first.id);
      }
    }

    async function createNewChat(uid, autoSelect) {
      const ref = doc(chatsCol(uid));
      await setDoc(ref, { title: "New chat", createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
      if (autoSelect !== false) {
        await loadChatList(uid);
      }
      return ref.id;
    }

    async function selectChat(uid, chatId) {
      currentChatId = chatId;
      closeSidebar();
      chatWindow.innerHTML = "";
      history = [];
      document.querySelectorAll(".chat-item").forEach((el) => el.classList.remove("active"));

      const q = query(messagesCol(uid, chatId), orderBy("createdAt", "asc"), limit(100));
      const snap = await getDocs(q);
      snap.forEach((docSnap) => {
        const d = docSnap.data();
        renderMessage("user", d.userMessage);
        renderMessage("bot", d.reply);
        history.push({ role: "user", content: d.userMessage });
        history.push({ role: "assistant", content: d.reply });
      });
      await loadChatList(uid); // refresh active highlight
    }

    newChatBtn.addEventListener("click", async () => {
      if (!currentUser) return;
      const id = await createNewChat(currentUser.uid, false);
      await selectChat(currentUser.uid, id);
    });

    // ---------- Auth ----------
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        authArea.innerHTML = `
        <div id="userInfo">
          <div class="user-avatar">${initials(user.displayName || user.email)}</div>
          <span>${user.displayName || user.email}</span>
          <button id="signOutBtn">Sign out</button>
        </div>`;
        document.getElementById("signOutBtn").onclick = () => signOut(auth);
        inputBar.style.display = "flex";
        currentChatId = null;
        await loadModels();
        await loadChatList(user.uid);
      } else {
        authArea.innerHTML = `<button id="signInBtn">Sign in with Google</button>`;
        document.getElementById("signInBtn").onclick = () =>
          signInWithPopup(auth, new GoogleAuthProvider());
        inputBar.style.display = "none";
        chatListEl.innerHTML = "";
        modelSelect.innerHTML = "";
        chatWindow.innerHTML = `
        <div id="signedOutNotice">
          <div class="empty-mark">📚</div>
          <h2>Welcome to NavGPT</h2>
          <p>Sign in to start chatting with Naveen — your conversation history is saved to your account.</p>
        </div>`;
      }
    });

    // ---------- Sending a message ----------
    async function send() {
      const text = messageInput.value.trim();
      if (!text || !currentUser || !currentChatId) return;
      messageInput.value = "";
      messageInput.style.height = "auto";
      sendBtn.disabled = true;
      renderMessage("user", text);
      renderTyping();

      let stream = null;
      let fullReply = "";

      try {
        const idToken = await currentUser.getIdToken();
        const res = await fetch(`${BACKEND_URL}/api/chat`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${idToken}`,
          },
          body: JSON.stringify({ message: text, history, modelId: selectedModelId }),
        });

        if (!res.ok || !res.body) throw new Error(`Backend responded with ${res.status}`);

        removeTyping();
        stream = createStreamingBubble();

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed.startsWith("data:")) continue;
            const data = trimmed.slice(5).trim();
            if (!data) continue;
            let event;
            try { event = JSON.parse(data); } catch { continue; }

            if (event.type === "reasoning") {
              stream.appendReasoning(event.text);
            } else if (event.type === "content") {
              stream.appendContent(event.text);
              fullReply += event.text;
            } else if (event.type === "error") {
              fullReply += `\n[${event.message}]`;
              stream.appendContent(`\n${event.message}`);
            } else if (event.type === "done") {
              stream.finish();
            }
          }
        }

        history.push({ role: "user", content: text });
        history.push({ role: "assistant", content: fullReply });

        const chatRef = doc(db, "users", currentUser.uid, "chats", currentChatId);
        await addDoc(messagesCol(currentUser.uid, currentChatId), {
          userMessage: text,
          reply: fullReply,
          createdAt: serverTimestamp(),
        });

        // Update chat title from the first message, and bump updatedAt for sidebar ordering
        const isFirstMessage = history.length <= 2;
        await setDoc(
          chatRef,
          {
            updatedAt: serverTimestamp(),
            ...(isFirstMessage ? { title: text.slice(0, 40) + (text.length > 40 ? "…" : "") } : {}),
          },
          { merge: true }
        );
        if (isFirstMessage) await loadChatList(currentUser.uid);
      } catch (err) {
        console.error(err);
        removeTyping();
        if (stream) {
          stream.finish();
        } else {
          renderMessage("bot", "Sorry, something went wrong. Please try again.");
        }
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
  </script>
</body>

</html>
